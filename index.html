<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>DDD Learner Improvement Interventions Tracker</title>
<!-- PWA: installable on Android home screen and via Play Store (TWA) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#074445">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Learner Interventions Tracker">
<meta name="description" content="Track learner improvement interventions across South African districts and schools.">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#0B8E8D;--teal-dk:#074445;--teal-lt:#E0F4F4;--teal-md:#4DB6AC;--green:#7AB648;--green-text:#467019;--green-dk:#5FAD56;--green-lt:#E8F5E9;--orange:#E8952E;--orange-text:#9E5800;--orange-lt:#FFF3E0;--navy:#1A2332;--white:#FFF;--off:#F7F9FC;--grey:#546E7A;--grey-lt:#ECEFF1;--grey-dk:#37474F;--red:#E53935;--red-lt:#FFEBEE;--blue:#1565C0;--blue-lt:#E3F2FD}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f3f2f1;color:#323130;min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,#074445 0%,#0F7B7D 50%,#0A6B4F 100%);position:sticky;top:0;z-index:100}
.hdr-bar{height:4px;background:linear-gradient(90deg,var(--teal),var(--green),var(--orange))}
.hdr-content{display:flex;align-items:center;gap:12px;padding:10px 16px;max-width:720px;margin:0 auto}
.hdr-logo{height:48px;border-radius:6px}
.hdr-brand{font-size:12.5px;font-weight:600;letter-spacing:2px;color:#B8DCDC;text-transform:uppercase;margin-bottom:2px}
.hdr-title{font-size:16px;font-weight:700;color:white;line-height:1.2}
.hdr-sub{font-size:13px;color:#B8DCDC;margin-top:2px}
.hdr-titles{flex:1}
nav.nav{display:flex;flex-direction:column;max-width:720px;margin:0 auto;padding:10px 16px 8px}
.nav-landing{text-align:center;padding:6px 0}
.nav-landing-prompt{font-size:18px;color:#fff;font-weight:700;margin-bottom:16px}
.nav-landing-grid{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;max-width:500px;margin:0 auto}
.nav-landing-btn{border:none;border-radius:16px;text-align:center;cursor:pointer;font-family:inherit;padding:24px 30px;transition:all .2s;min-width:180px;flex:1;box-shadow:0 2px 8px rgba(7,68,69,.10)}
.nav-landing-btn.primary{background:#7AB648;color:#1A2332}
.nav-landing-btn.primary:active{background:#6a9e3e}
.nav-landing-btn.secondary{background:#fff;border:3px solid #7AB648;color:#074445}
.nav-landing-btn.secondary:active{background:#f0f7f0}
.nav-landing-btn .nav-btn-label{font-size:17px;font-weight:700;margin-bottom:4px}
.nav-landing-btn .nav-btn-desc{font-size:14px;opacity:.7;line-height:1.3}
.nav-landing-full{margin-top:4px;padding:14px 24px;border-radius:16px;background:#fff;border:3px solid var(--orange);text-align:center;cursor:pointer;font-family:inherit;transition:all .2s;color:#074445;max-width:280px;margin-left:auto;margin-right:auto;box-shadow:0 2px 8px rgba(232,149,46,.12)}
.nav-landing-full:active{background:#FFF8F0}
.nav-landing-full .nav-btn-label{font-size:15px;font-weight:700;display:block}
.nav-landing-full .nav-btn-desc{font-size:14px;color:#546E7A;display:block;margin-top:2px}
@media(hover:hover){.nav-landing-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(7,68,69,.16)}.nav-landing-full:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(232,149,46,.18)}}
.nav-landing-btn:active,.nav-landing-full:active{transform:scale(.97)}
.nav-compact{display:flex;gap:6px;align-items:center}
.nav-compact-btn{flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);text-align:center;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;color:rgba(255,255,255,.55);transition:all .2s}
.nav-compact-btn:active{background:rgba(255,255,255,.15)}
.nav-compact-btn.active{background:rgba(122,182,72,.25);border:1.5px solid #7AB648;color:white}
.nav-compact-btn.tk{flex:0 0 auto;background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.4)}
.nav-compact-btn.tk.active{background:rgba(122,182,72,.25);border:1.5px solid #7AB648;color:white}
@media(max-width:420px){.nav-landing-grid{flex-direction:column;gap:10px}.nav-landing-btn{min-width:0;padding:18px 20px}.nav-landing-btn .nav-btn-label{font-size:15px}.nav-landing-full{max-width:none}.nav-landing-full .nav-btn-label{font-size:14px}.nav-compact-btn{font-size:13px;padding:7px 8px}}
.btm-nav{display:none}
@media(max-width:760px){.nav-compact{display:none}#app{padding-bottom:calc(68px + env(safe-area-inset-bottom))}.btm-nav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:150;background:#fff;border-top:1px solid #e1dfdd;box-shadow:0 -2px 12px rgba(7,68,69,.07);padding-bottom:env(safe-area-inset-bottom)}.btm-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:56px;border:none;background:none;cursor:pointer;font-family:inherit;color:#646f75;padding:7px 4px;transition:color .15s}.btm-nav-btn:active{background:rgba(7,68,69,.05)}.btm-nav-ic{width:24px;height:24px}.btm-nav-lbl{font-size:13px;font-weight:700;letter-spacing:.2px}.btm-nav-btn.active{color:#074445}.toast{bottom:calc(72px + env(safe-area-inset-bottom))}.update-banner{bottom:calc(72px + env(safe-area-inset-bottom))}}

/* FORM */
.form-wrap{max-width:640px;margin:0 auto;padding:16px 16px 40px}
.form-group{background:#f7f9fc;border-radius:8px;padding:14px 14px 2px;margin:8px 0 12px}
.form-group-label{font-size:12.5px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.form-progress-msg{text-align:center;font-size:14px;color:var(--teal);margin:6px auto 2px;font-style:italic;font-weight:500;max-width:420px;line-height:1.4}
.grade-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.grade-grid label.tag{min-height:44px;display:flex;align-items:center;justify-content:center;padding:10px 8px;font-size:14px;border-radius:8px}
@media(min-width:500px){.grade-grid{grid-template-columns:repeat(4,1fr)}}
.school-count-indicator{font-size:14px;font-weight:600;color:var(--teal);margin-top:6px}
.section{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.sec-hdr{padding:14px 18px 8px;border-left:4px solid var(--teal);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sec-hdr:active{transform:scale(.99);opacity:.9}
.sec-hdr h2{font-size:15px;font-weight:600;color:#323130}
.sec-hdr p{font-size:14px;color:#605e5c;margin-top:2px}
.sec-hdr.green{border-color:var(--green)}
.sec-hdr.orange{border-color:var(--orange)}
.sec-hdr.blue{border-color:var(--blue)}
.sec-body{padding:4px 18px 16px}
.sec-body.collapsed{display:none}
.field{padding:10px 0;border-top:1px solid #f3f2f1}
.field:first-child{border-top:none}
.field label{display:block;font-size:14.5px;font-weight:600;color:#323130;margin-bottom:5px}
.field .hint{font-size:14px;color:#605e5c;margin-bottom:6px;font-weight:400}
.sel-hint{font-size:14px;color:#0B8E8D;margin-top:5px;padding:5px 8px;background:#E8F6F5;border-radius:4px;line-height:1.4;font-style:italic}
.req{color:#a4262c;margin-left:2px}
.field select,.field input[type=text],.field input[type=date],.field input[type=number],.field input[type=url],.field input[type=email],.field textarea{width:100%;padding:8px 10px;border:1px solid #c8c6c4;border-radius:4px;font-size:14px;font-family:inherit;background:#fff;color:#323130}
.field select:focus,.field input:focus,.field textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 1px var(--teal)}
.field textarea{resize:vertical;min-height:50px}

.school-picker{position:relative}
.school-tags{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.school-tag{display:flex;align-items:center;gap:10px;background:#E8F5E9;color:var(--navy);border:1.5px solid #7AB648;border-radius:8px;padding:10px 12px;font-size:14px;font-weight:600;line-height:1.3}
.school-tag .st-info{flex:1;min-width:0}
.school-tag .st-name{font-size:14px;font-weight:700;color:var(--navy)}
.school-tag .st-meta{font-size:12.5px;color:var(--grey);margin-top:2px}
.school-tag button{background:none;border:1px solid #c8c6c4;color:var(--grey);cursor:pointer;font-size:12.5px;padding:4px 10px;border-radius:6px;font-family:inherit;font-weight:600;flex-shrink:0}
.school-tag button:hover{border-color:#c00;color:#c00}
.school-trigger{width:100%;padding:8px 10px;border:1px solid #c8c6c4;border-radius:4px;font-size:14px;background:#fff;color:#323130;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center}
.school-trigger:hover{border-color:var(--teal)}
.school-trigger.open{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal);border-radius:4px 4px 0 0}
.school-trigger .arrow{font-size:12.5px;color:#999;transition:transform .2s}
.school-trigger.open .arrow{transform:rotate(180deg)}
.school-trigger.disabled{background:#f3f2f1;color:#999;cursor:not-allowed}
.school-dd{position:absolute;top:100%;left:0;right:0;z-index:50;background:#fff;border:1px solid var(--teal);border-top:none;border-radius:0 0 6px 6px;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.school-dd-filter{padding:8px 10px;border-bottom:1px solid #e8e6e4}
.school-dd-filter input{width:100%;padding:10px 12px;border:2px solid var(--teal);border-radius:8px;font-size:14px;font-family:inherit}
.school-dd-filter input:focus{outline:none;border-color:var(--teal)}
.school-dd-list{max-height:45vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.school-dd-item{padding:12px 12px;font-size:14px;color:#323130;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f8f7f6;min-height:48px}
.school-dd-item:hover{background:var(--teal-lt)}
.school-dd-item.checked{background:#f0faf9;font-weight:600}
.school-dd-item .tick{width:20px;height:20px;border:2px solid #c8c6c4;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}
.school-dd-item.checked .tick{background:var(--teal);border-color:var(--teal)}
.school-dd-hint{padding:8px 10px;font-size:14px;color:#999;font-style:italic;text-align:center}
.school-dd-foot{padding:6px 10px;border-top:1px solid #e8e6e4;display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--grey)}
.school-count{font-size:12.5px;color:var(--grey);margin-top:2px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.field-row{grid-template-columns:1fr}}

/* Tags / Chips */
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{display:flex;align-items:center;gap:4px;font-size:14px;padding:5px 10px;border:1px solid #e1dfdd;border-radius:4px;cursor:pointer;transition:.15s;font-weight:400}
.tag:hover{background:#f3f2f1}
.tag:has(input:checked){border-color:var(--teal);background:var(--teal-lt)}
.tag input:checked+span{color:var(--teal-dk);font-weight:500}
.tag input{display:none}
.tag-orange:has(input:checked){border-color:var(--orange);background:var(--orange-lt)}
.tag-orange input:checked+span{color:#E07B2A}
.tag-grp-title{font-size:13px;font-weight:600;color:#4A6B6B;display:flex;align-items:center;min-width:60px}

/* Task-based report selection */
.tq-cat{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#9ca3af;margin:14px 0 6px;padding-left:2px}
.tq-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.tq-card{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid #e1dfdd;border-radius:6px;cursor:pointer;transition:.18s;background:#fff;user-select:none}
.tq-card:hover{border-color:var(--teal);background:var(--teal-lt)}
.tq-card.sel{border-color:var(--teal);background:var(--teal-lt);box-shadow:inset 0 0 0 1px var(--teal)}
.tq-chk{flex-shrink:0;width:18px;height:18px;border:2px solid #d1d5db;border-radius:4px;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s}
.tq-card.sel .tq-chk{background:var(--teal);border-color:var(--teal)}
.tq-chk svg{opacity:0;transition:opacity .12s}
.tq-card.sel .tq-chk svg{opacity:1}
.tq-q{font-size:14.5px;font-weight:600;color:#1A2332;line-height:1.35}
.tq-map{font-size:12.5px;color:#9ca3af;margin-top:2px;display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.tq-badge{display:inline-block;padding:0 5px;background:#f3f4f6;border-radius:3px;font-size:9.5px;font-weight:600;color:#6b7280;letter-spacing:.2px}
.tq-expand{display:flex;align-items:center;gap:6px;padding:10px 0 2px;cursor:pointer;user-select:none}
.tq-expand>span:first-of-type{font-size:14px;font-weight:600;color:var(--teal)}
.tq-cnt{font-size:12.5px;font-weight:600;color:#9ca3af;background:#f3f4f6;padding:1px 7px;border-radius:10px}
.tq-expand svg{transition:transform .2s;color:var(--teal)}
.tq-expand.open svg{transform:rotate(180deg)}
.tq-extra{overflow:hidden;max-height:0;transition:max-height .4s ease}
.tq-extra.open{max-height:1200px}
.tq-other{margin-top:8px}
.tq-other input{width:100%;padding:8px 10px;border:1px solid #e1dfdd;border-radius:4px;font-size:14px;font-family:inherit;color:#374151;outline:none;transition:border-color .15s}
.tq-other input:focus{border-color:var(--teal)}
.tq-other input::placeholder{color:#9ca3af}

/* Radio group */
.radio-grp{display:flex;flex-direction:column;gap:5px}
.radio-grp label{display:flex;align-items:center;gap:8px;font-size:14px;padding:7px 10px;border:1px solid #e1dfdd;border-radius:4px;cursor:pointer;font-weight:400}
.radio-grp label:hover{background:#f3f2f1}
.radio-grp label:has(input:checked){border-color:var(--teal);background:var(--teal-lt)}

/* Buttons */
.btn{padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn.secondary{background:#fff;border:1px solid #D0D7DE;color:#111827}
.btn.secondary:hover{background:#F3F4F6}
.btn.secondary:active{transform:translateY(1px)}

.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal-dk)}
.btn-outline{background:#fff;color:var(--teal);border:1px solid var(--teal)}.btn-outline:hover{background:var(--teal-lt)}
.btn-sm{padding:6px 14px;font-size:14px;border-radius:4px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.save-later-row{text-align:center;margin-top:10px;padding-top:10px;border-top:1px dashed #e0e4e8}
.btn-save-later{background:transparent;border:none;color:var(--teal);font-size:14px;font-weight:600;cursor:pointer;padding:6px 10px;font-family:inherit;text-decoration:underline;text-underline-offset:3px}
.btn-save-later:active{color:var(--teal-dk)}
.save-later-hint{display:block;font-size:12.5px;color:var(--grey);margin-top:2px;font-weight:400;text-decoration:none}
.resume-card{background:#FFF8E1;border:1.5px solid #FFE082;border-left:4px solid var(--orange);border-radius:8px;padding:14px 16px;margin:0 0 14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.resume-card-body{min-width:0}
.resume-card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:3px}
.resume-card-meta{font-size:14px;color:var(--grey-dk);margin-bottom:10px;line-height:1.4}
.resume-card-actions{display:flex;gap:8px;flex-wrap:wrap}

/* Success */
.success{text-align:center;padding:40px 20px}

/* WELCOME SCREEN */
.welcome-wrap{max-width:640px;margin:0 auto;padding:16px 16px 40px}
.welcome-card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden;animation:fadeUp .5s ease}
.welcome-hero{text-align:center;padding:28px 22px 0}
.welcome-wave{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--teal-lt),#d4f0f0);margin-bottom:14px;font-size:28px}
.welcome-hero h2{font-size:19px;color:var(--navy);margin:0 0 4px;font-weight:700;line-height:1.3}
.welcome-hero p{font-size:14px;color:var(--grey);line-height:1.6;margin:0 auto 20px;max-width:400px}
.welcome-cards{padding:0 18px 6px;display:flex;flex-direction:column;gap:10px}
.wc-card{display:flex;gap:14px;padding:14px 16px;background:#fff;border-radius:10px;border:1px solid #f0eeec;border-left-width:3px}
.wc-card .wc-icon{font-size:22px;line-height:1;flex-shrink:0;margin-top:1px}
.wc-card .wc-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:3px}
.wc-card .wc-desc{font-size:13.5px;color:var(--grey);line-height:1.55}

.welcome-cta{padding:20px 18px 24px;text-align:center}
.welcome-cta .btn-go{background:linear-gradient(135deg,var(--teal-dk),#0F7B7D);color:#fff;border:none;border-radius:10px;padding:16px 40px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 3px 12px rgba(11,142,141,.35);transition:transform .15s,box-shadow .15s;min-width:220px;-webkit-tap-highlight-color:rgba(11,142,141,.2);touch-action:manipulation}
.welcome-cta .btn-go:active{transform:scale(.97)}
.welcome-cta .btn-go:hover{box-shadow:0 4px 16px rgba(11,142,141,.45)}

/* FEEDBACK FORM */
.fb-section{margin:16px 0 0;padding:18px 16px;background:#fff;border-radius:10px;border:1px solid #e8e6e4;animation:fadeUp .4s ease .2s both}
.fb-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.fb-header .fb-icon{font-size:18px}
.fb-header .fb-title{font-size:14px;font-weight:700;color:var(--navy)}
.fb-header .fb-sub{font-size:14px;color:var(--grey)}
.fb-question{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:8px}
.fb-rating{display:flex;gap:6px;margin-bottom:16px}
.fb-rate-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border-radius:8px;border:2px solid #e8e6e4;background:#fff;cursor:pointer;transition:all .15s;font-family:inherit}
.fb-rate-btn:hover{border-color:var(--teal-md)}
.fb-rate-btn.sel{border-color:var(--teal);background:var(--teal-lt)}
.fb-rate-btn .fb-emoji{font-size:22px}
.fb-rate-btn .fb-label{font-size:13px;font-weight:600;color:#999;line-height:1.2}
.fb-rate-btn.sel .fb-label{color:var(--teal-dk)}
.fb-checks{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fb-check{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:1.5px solid #e8e6e4;background:#fff;cursor:pointer;transition:all .15s;font-size:13.5px;color:var(--navy)}
.fb-check:hover{border-color:var(--teal-md)}
.fb-check.sel{border-color:var(--teal);background:var(--teal-lt);color:var(--teal-dk);font-weight:600}
.fb-tick{width:18px;height:18px;border-radius:4px;flex-shrink:0;border:1.5px solid #c8c6c4;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;transition:all .15s}
.fb-check.sel .fb-tick{background:var(--teal);border-color:var(--teal)}
.fb-textarea{width:100%;padding:9px 11px;border:1px solid #c8c6c4;border-radius:6px;font-size:13.5px;font-family:inherit;color:var(--navy);resize:vertical;outline:none;box-sizing:border-box;line-height:1.55;min-height:60px}
.fb-textarea:focus{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal)}
.fb-actions{display:flex;gap:10px;margin-top:16px}
.fb-submit{flex:1;padding:11px 16px;border-radius:8px;border:none;background:var(--teal);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.fb-submit:disabled{background:#d0d4db;cursor:not-allowed;opacity:.6}
.fb-skip{padding:11px 16px;border-radius:8px;border:1px solid #d0d7de;background:#fff;color:var(--grey);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.fb-skip:hover{background:#f8f7f6}
.fb-anon{text-align:center;font-size:12.5px;color:#b0b0b0;margin-top:10px}
.fb-thankyou{text-align:center;padding:24px 16px;animation:fadeUp .4s ease}
.fb-thankyou .fb-ty-icon{font-size:36px;margin-bottom:8px}
.fb-thankyou h3{font-size:16px;color:var(--navy);margin:0 0 6px}
.fb-thankyou p{font-size:14px;color:var(--grey);line-height:1.6;max-width:340px;margin:0 auto}
.success h2{font-size:22px;color:var(--teal-dk);margin-bottom:8px}
.success p{font-size:14px;color:var(--grey)}

/* DASHBOARD */
.dash-wrap{max-width:860px;margin:0 auto;padding:16px 16px 40px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
@media(max-width:600px){.stats-row{grid-template-columns:1fr}}
@media(min-width:601px) and (max-width:800px){.stats-row{grid-template-columns:1fr 1fr}}
.dash-panels{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:600px){.dash-panels{grid-template-columns:1fr}}

/* ═══ MOBILE RESPONSIVE OVERRIDES ═══ */
.stat-card{background:#fff;border-radius:10px;padding:20px 22px;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #ECEFF1}
.stat-card .st-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:2px}
.stat-card .st-desc{font-size:13px;color:var(--grey);line-height:1.4;margin-bottom:16px}
.stat-card .st-num{font-size:36px;font-weight:300;line-height:1;color:var(--teal)}
.stat-card.green .st-num{color:var(--green-dk)}
.stat-card.orange .st-num{color:var(--orange-text)}
.stat-card .st-foot{font-size:13px;color:var(--grey);margin-top:12px;padding-top:10px;border-top:1px solid #f0f0f0}

.dash-section{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.dash-section-hdr{padding:14px 16px;border-bottom:1px solid var(--grey-lt);display:flex;justify-content:space-between;align-items:center}
.dash-section-hdr h3{font-size:14px;font-weight:700;color:var(--navy)}
.dash-section-body{padding:14px 16px}
.dash-section-desc{font-size:14px;color:var(--grey-dk);line-height:1.6;margin-bottom:12px}
.dash-subnav{display:flex;flex-wrap:wrap;gap:6px;overflow-x:visible;padding:8px 16px 6px;position:sticky;top:0;z-index:50;background:#fff;margin:0 -16px;box-shadow:0 2px 8px rgba(0,0,0,.1);border-bottom:1px solid #e0e0e0}
.dash-subnav::-webkit-scrollbar{display:none}
.dash-subnav button{flex:1 1 auto;min-width:0;font-size:14px;font-weight:700;padding:8px 12px;border-radius:8px;border:2px solid #d0d4db;background:#fff;color:var(--grey-dk);cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;text-align:center}
.dash-subnav button.active{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:0 2px 8px rgba(11,142,141,.3)}
.dash-subnav button:not(.active):hover{border-color:var(--teal);color:var(--teal);background:var(--teal-lt);transform:translateY(-1px)}
.dash-subnav-hint{text-align:center;font-size:12.5px;color:var(--grey);padding:6px 16px 0;margin:0 -16px;background:#fff}

/* Dashboard filter bar */
.dash-filters{background:linear-gradient(135deg,#1A2332 0%,#2A3A4E 100%);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.dash-term-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.12)}
.dash-filters-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.dash-filter-grp label{display:block;font-size:13px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.dash-filter-grp select{width:100%;padding:7px 8px;border:1.5px solid rgba(255,255,255,.2);border-radius:6px;font-size:14px;font-weight:600;font-family:inherit;color:#fff;background:rgba(255,255,255,.1);cursor:pointer;appearance:auto;-webkit-appearance:auto}
.dash-filter-grp select:focus{border-color:var(--teal);outline:none;box-shadow:0 0 0 2px rgba(11,142,141,.3)}
.dash-filter-grp select:disabled{opacity:.5;cursor:not-allowed;background:rgba(255,255,255,.05)}
.dash-filter-grp select option{color:#1A2332;background:#fff}
.dash-filters-info{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.dash-filters-count{font-size:12.5px;color:rgba(255,255,255,.5)}
.dash-filters-clear{font-size:12.5px;color:var(--teal);font-weight:700;background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 8px;border-radius:4px;transition:.15s}
.dash-filters-clear:hover{background:rgba(11,142,141,.2)}
@media(max-width:500px){.dash-filters-row{grid-template-columns:1fr 1fr}}


/* Loading / Toast */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;color:var(--grey)}
.spinner{width:32px;height:32px;border:3px solid var(--grey-lt);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:10px 20px;border-radius:8px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1;pointer-events:auto;cursor:pointer}

/* Update banner */
.update-banner{position:fixed;bottom:16px;right:16px;z-index:200;background:#074445;color:#fff;padding:14px 18px;box-shadow:0 4px 20px rgba(0,0,0,.25);transform:translateY(calc(100% + 20px));transition:transform .4s ease;display:flex;flex-direction:column;gap:10px;border-radius:12px;max-width:340px}
.update-banner.visible{transform:translateY(0)}
.update-banner-text{font-size:14px;line-height:1.5;text-align:left}
.update-banner-text strong{color:var(--green)}
.update-banner-btns{display:flex;gap:8px}
.update-banner-btn{flex:1;padding:10px 16px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;text-align:center}
.update-banner-btn.primary{background:var(--green);color:#1A2332}
.update-banner-btn.secondary{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* File upload */
.upload-area{border:2px dashed #c8c6c4;border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc}
.upload-area:hover,.upload-area.drag-over{border-color:var(--teal);background:var(--teal-lt)}
.upload-area input[type="file"]{display:none}
.upload-label{font-size:14px;color:var(--teal);font-weight:600}
.upload-hint{font-size:14px;color:var(--grey);margin-top:2px}

/* Validation errors */
.validation-banner{background:#FFF4F2;border:1px solid #E8563B;border-radius:8px;padding:14px 16px;margin-bottom:16px;animation:fadeIn .3s}
.validation-banner h3{font-size:14px;color:#C22A0E;margin:0 0 10px;display:flex;align-items:center;gap:6px}
.validation-banner h3::before{content:'\26A0';font-size:15px}
.validation-missing{list-style:none;padding:0;margin:0}
.validation-missing li{font-size:14px;color:var(--navy);padding:6px 10px;border-radius:6px;margin-bottom:4px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.validation-missing li:hover{background:#FDEAE6}
.validation-missing li .vm-step{font-size:12.5px;font-weight:700;color:#fff;background:var(--teal);border-radius:10px;padding:1px 7px;flex-shrink:0}
.validation-missing li .vm-field{font-weight:600}
.validation-missing li .vm-arrow{margin-left:auto;color:var(--teal);font-size:14px;font-weight:700}
.field-error select,.field-error input:not([type="checkbox"]):not([type="radio"]){border-color:#E8563B!important;box-shadow:0 0 0 2px rgba(232,86,59,.15)!important}
.field-error .school-trigger{border-color:#E8563B!important;box-shadow:0 0 0 2px rgba(232,86,59,.15)!important}
.step-error-dot{width:8px;height:8px;background:#E8563B;border-radius:50%;display:inline-block;margin-left:4px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.file-preview{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--green-lt);border-radius:6px;margin-top:8px;font-size:14px}
.file-preview .file-name{flex:1;font-weight:600;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 6px}
/* Stepped form */
.form-progress{display:flex;gap:3px;padding:10px 16px;background:#fff;border-radius:8px;margin-bottom:12px}
.form-progress-step{flex:1;padding:6px;border-radius:4px;font-size:12.5px;font-weight:600;text-align:center;cursor:pointer;transition:all .2s}
.form-progress-step.active{background:var(--teal);color:#fff}
.form-progress-step.done{background:var(--teal-lt);color:var(--teal)}
.form-progress-step.upcoming{background:#f3f2f1;color:var(--grey)}

/* Live progress bar */
.form-live-progress{padding:12px 16px 0;margin-bottom:0}
.form-live-progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.form-live-progress-label{font-size:13px;font-weight:600;color:var(--grey-dk)}
.form-live-progress-pct{font-size:14px;font-weight:700;color:var(--teal)}
.form-live-progress-pct.complete{color:var(--green-text)}
.form-live-bar{height:6px;background:#e8e6e4;border-radius:3px;overflow:hidden}
.form-live-bar-fill{height:100%;border-radius:3px;transition:width .4s ease,background .4s ease}
.form-live-progress-hint{font-size:12.5px;color:var(--grey);margin-top:5px;line-height:1.4;min-height:14px}
.review-card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:10px;overflow:hidden}
.review-card-hdr{padding:10px 14px;font-size:14px;font-weight:700;border-bottom:1px solid #f3f2f1}
.review-row{display:flex;justify-content:space-between;padding:5px 14px;font-size:14px;border-bottom:1px solid #f9f9f9}
.review-row:last-child{border:none}
.review-label{color:var(--grey)}
.review-value{font-weight:600;color:var(--navy);text-align:right;max-width:60%}
.checkbox-grp{display:flex;flex-direction:column;gap:5px}
.checkbox-grp label{display:flex;align-items:flex-start;gap:8px;font-size:14px;padding:7px 10px;border:1px solid #e1dfdd;border-radius:4px;cursor:pointer;font-weight:400;line-height:1.4}
.checkbox-grp label:hover{background:#f3f2f1}
.checkbox-grp label:has(input:checked){border-color:var(--teal);background:var(--teal-lt)}

/* Email Gate */
.gate-wrap{max-width:440px;margin:0 auto;padding:40px 16px 60px}
.gate-card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}
.gate-top{background:linear-gradient(135deg,#074445 0%,#0F7B7D 50%,#0A6B4F 100%);padding:28px 24px;text-align:center}
.gate-top img{height:56px;border-radius:8px;margin-bottom:10px}
.gate-top h1{font-size:17px;font-weight:700;color:#fff;margin-bottom:4px}
.gate-top p{font-size:14px;color:#B8DCDC;line-height:1.5}
.gate-body{padding:28px 24px;box-sizing:border-box}
.gate-body label{display:block;font-size:14px;font-weight:600;color:#323130;margin-bottom:6px}
.gate-body input[type=email]{width:100%;padding:11px 14px;border:1.5px solid #c8c6c4;border-radius:6px;font-size:14px;font-family:inherit;transition:border-color .2s;box-sizing:border-box}
.gate-body input[type=email]:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px rgba(11,142,141,.15)}
.gate-body input[type=password],.gate-body input[type=text]{width:100%;padding:11px 14px;border:1.5px solid #c8c6c4;border-radius:6px;font-family:inherit;transition:border-color .2s;box-sizing:border-box}
.gate-body input[type=password]:focus,.gate-body input[type=text]:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px rgba(11,142,141,.15)}
.gate-err{color:var(--red);font-size:14px;margin-top:6px;display:none}
.gate-err.show{display:block}
.gate-btn{width:100%;padding:12px;border:none;border-radius:6px;background:var(--teal);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;transition:background .15s}
.gate-btn:hover{background:var(--teal-dk)}
.gate-btn:disabled{opacity:.6;cursor:not-allowed}
.gate-note{font-size:14px;color:var(--grey);text-align:center;margin-top:14px;line-height:1.5}
.gate-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
.hdr-logout{background:none;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);font-size:12.5px;font-weight:600;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.hdr-logout:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.5);color:#fff}

/* Footer */
.footer{max-width:640px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:8px;border-top:2px solid var(--green)}
.footer span{font-size:12.5px;color:#7B8D9E}
.footer img{height:22px;border-radius:3px;opacity:.7}

/* CHAIN VIEW */
.chain{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:12px;overflow:hidden}
.tap-hint{font-size:14px;color:var(--teal-md);font-weight:600;letter-spacing:.3px;margin-top:3px}
.tap-chevron{font-size:18px;color:var(--teal);transition:transform .2s;font-weight:700}

/* TOOLKIT */
.tk-wrap{max-width:720px;margin:0 auto;padding:16px 16px 40px}
.tk-tabs{display:flex;gap:6px;background:#fff;padding:10px 12px;border-radius:8px;margin-bottom:0;overflow-x:auto;justify-content:center;flex-wrap:wrap}
.tk-tab{padding:10px 16px;border:2px solid #e1dfdd;background:#fff;color:var(--grey-dk);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border-radius:8px;transition:all .2s;white-space:nowrap;display:flex;align-items:center;justify-content:center;min-height:44px;gap:4px}
.tk-tab.on{color:#fff;background:var(--teal);border-color:var(--teal);box-shadow:0 2px 8px rgba(11,142,141,.25)}
.tk-tab:hover:not(.on){color:var(--teal);border-color:var(--teal);background:var(--teal-lt);transform:translateY(-1px)}
.tk-card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:10px;overflow:hidden;border:2px solid transparent;transition:all .2s;cursor:pointer}
.tk-card.sel{border-color:var(--teal)}
.tk-card-h{padding:12px 14px;display:flex;align-items:center;gap:10px}
.tk-card-h:hover{background:var(--off)}
.tk-card-h:active{background:#EDF0F2;transform:scale(.995)}
.tk-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tk-card-b{padding:0 14px 14px;border-top:1px solid #f3f2f1}
.tk-path{background:var(--blue-lt);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--blue);display:flex;align-items:center;gap:5px;margin-top:8px;font-weight:500;font-family:'Cascadia Code','Consolas',monospace}
.tk-badge{display:inline-flex;align-items:center;gap:3px;font-size:12.5px;padding:3px 8px;border-radius:4px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid #FFE0B2;background:var(--orange-lt);color:#E07B2A}
.tk-chips{display:flex;flex-wrap:wrap;gap:4px}
.tk-chip{font-size:12.5px;padding:3px 7px;border-radius:4px;font-weight:500}
.tk-tip{border-radius:8px;padding:10px 12px;border-left:3px solid;margin-top:10px}
.tk-step{display:flex;gap:8px;margin-bottom:4px;font-size:14px;color:var(--grey-dk);line-height:1.5}
.tk-sn{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;flex-shrink:0;background:var(--teal-lt);color:var(--teal)}

.tk-filt{padding:4px 10px;border-radius:4px;border:1px solid #e1dfdd;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:#fff;transition:.15s}
.tk-filt.on{border-color:var(--teal);background:var(--teal-lt);color:var(--teal-dk)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:12px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto;animation:modalIn .2s}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* Visit history card */
.visit-history-card{background:#f0f7f7;border:1px solid #d0e4e4;border-radius:8px;padding:12px 14px;margin-top:8px;margin-bottom:4px}
.visit-history-card .vh-title{font-size:13px;font-weight:700;color:var(--teal-dk);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.visit-history-card .vh-summary{display:flex;gap:14px;margin-bottom:8px;padding:6px 10px;background:#e4f2f2;border-radius:6px;font-size:13.5px;color:var(--navy)}
.visit-history-card .vh-summary span{display:flex;flex-direction:column;align-items:center}
.visit-history-card .vh-summary strong{font-size:16px;font-weight:700;color:var(--teal-dk);line-height:1.1}
.visit-history-card .vh-summary em{font-size:12.5px;font-style:normal;color:var(--grey);text-transform:uppercase;letter-spacing:0.5px}
.visit-history-card .vh-rows{max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#b0d0d0 transparent}
.visit-history-card .vh-rows::-webkit-scrollbar{width:4px}
.visit-history-card .vh-rows::-webkit-scrollbar-thumb{background:#b0d0d0;border-radius:2px}
.visit-history-card .vh-rows.vh-collapsed{max-height:0;overflow:hidden}
.visit-history-card .vh-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #e0eded;font-size:13.5px;color:var(--navy)}
.visit-history-card .vh-row:last-child{border-bottom:none}
.visit-history-card .vh-school{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:10px}
.visit-history-card .vh-count{font-size:13.5px;color:var(--navy);text-align:right;white-space:nowrap}
.visit-history-card .vh-zero{color:#b0aeac;font-style:italic}
.visit-history-card .vh-toggle{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:13px;color:var(--teal-dk);cursor:pointer;background:none;border:none;padding:0;font-weight:600;text-decoration:underline;text-underline-offset:2px}
.visit-history-card .vh-toggle:hover{color:var(--navy)}

/* ─── SUPPORT CARDS + THREADS (teal theme — matches Activity Tracker) ─── */
.sup-time-tabs{display:flex;gap:0;padding:0 0 10px}
.sup-time-tab{font-size:13px;font-weight:600;padding:5px 12px;border-radius:99px;border:1.5px solid var(--grey-lt);background:#fff;color:var(--grey);cursor:pointer;transition:all .15s;font-family:inherit;min-height:44px}
.sup-time-tab:hover{border-color:#ccc}
.sup-time-tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.sup-card{border-radius:12px;border:1px solid #e8e6e4;overflow:hidden;transition:all .2s;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sup-school-tag{font-size:12.5px;background:#f5f5f5;border:1px solid var(--grey-lt);border-radius:4px;padding:2px 7px;color:var(--navy)}
.thread-area{border-top:1px solid #e8e6e4;padding:10px 14px 12px;background:#FAFBFC}
.thread-label{font-size:12.5px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.thread-count{font-size:9px;font-weight:700;color:#fff;background:var(--teal);border-radius:99px;padding:1px 7px;min-width:18px;text-align:center}
.sup-comment{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f0eded}
.sup-comment:last-of-type{border-bottom:none}
.sup-comment-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;text-transform:uppercase;background:var(--teal)}
.sup-comment-body{flex:1;min-width:0}
.sup-comment-hdr{display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.sup-comment-name{font-size:13px;font-weight:700;color:var(--navy)}
.sup-comment-role{font-size:13px;color:var(--grey);font-weight:600;background:#f0f0f0;padding:1px 6px;border-radius:99px}
.sup-comment-time{font-size:13px;color:var(--grey)}
.sup-comment-text{font-size:13.5px;color:var(--navy);line-height:1.5}
.thread-empty{font-size:14px;color:var(--grey);font-style:italic;padding:4px 0 2px}
.reply-box{display:flex;flex-direction:column;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid #f0eded;position:relative}
.reply-input{width:100%;box-sizing:border-box;font-size:14px;font-family:inherit;border:1.5px solid var(--grey-lt);border-radius:20px;padding:10px 14px;resize:none;min-height:44px;max-height:100px;line-height:1.4;outline:none;transition:border-color .15s}
.reply-input:focus{border-color:var(--teal)}
.reply-input::placeholder{color:#b0aeac;font-size:14px}
.reply-actions{display:flex;justify-content:flex-end;align-items:center;gap:4px}
.reply-attach{background:none;border:1px solid var(--grey-lt);border-radius:20px;font-size:20px;cursor:pointer;padding:8px 12px;color:var(--grey);min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s}
.reply-attach:hover{border-color:var(--teal);background:var(--teal-lt)}
.attach-hint{font-size:14px;color:var(--teal);font-weight:600;flex:1;min-width:0;line-height:1.3}
.voice-btn{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;border:1.5px solid var(--grey-lt);background:#fff;color:var(--grey);cursor:pointer;transition:all .2s;flex-shrink:0;font-size:18px;padding:0}
.voice-btn:hover{border-color:var(--teal);color:var(--teal)}
.voice-btn.recording{border-color:#E53935;background:#FFEBEE;color:#E53935;animation:pulse 1.5s infinite}
.voice-row{display:flex;align-items:flex-end;gap:6px}
.voice-row textarea,.voice-row input[type="text"]{flex:1;min-width:0}
.voice-hint{position:absolute;bottom:calc(100% + 6px);right:0;width:240px;background:#1A2332;color:#fff;font-size:14px;line-height:1.5;padding:10px 14px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:100;animation:fadeIn .2s}
.voice-hint::after{content:'';position:absolute;top:100%;right:16px;border:6px solid transparent;border-top-color:#1A2332}
.reply-send{border-radius:20px;border:none;background:var(--teal);color:#fff;font-size:14px;font-weight:700;cursor:pointer;padding:10px 20px;min-height:44px;transition:background .15s;flex-shrink:0;font-family:inherit;white-space:nowrap}
.reply-send:hover{background:var(--teal-dk)}
/* Scope badges */
.scope-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;margin-bottom:4px}
.scope-badge.sb-all{background:var(--teal-lt);color:var(--teal)}
.scope-badge.sb-district{background:#E3F2FD;color:#1565C0}
.scope-badge.sb-school{background:#E8F5E9;color:#43A047}
/* Resolution UI */
.sup-resolved-banner{background:#E8F5E9;border:1px solid #C8E6C9;border-radius:8px;padding:10px 12px;margin-bottom:10px}
.sup-resolved-title{font-size:13px;font-weight:700;color:#2E7D32;margin-bottom:4px}
.sup-resolved-by{font-size:12.5px;color:#558B2F;line-height:1.5}
.sup-resolved-comment{font-size:13px;color:var(--navy);line-height:1.5;margin-top:6px;padding:6px 8px;background:#fff;border-radius:6px;border-left:3px solid #43A047}
.sup-resolve-flow{border-top:1px solid #e8e6e4;padding:10px 14px;background:#FAFFFE}
.sup-resolve-form{margin-top:8px}
.sup-resolve-textarea{width:100%;box-sizing:border-box;font-size:14px;font-family:inherit;border:1.5px solid #C8E6C9;border-radius:12px;padding:10px 14px;resize:none;min-height:60px;line-height:1.4;outline:none;transition:border-color .15s}
.sup-resolve-textarea:focus{border-color:#43A047}
.sup-resolve-textarea.resolve-error{border-color:var(--red)}
.sup-resolve-actions{display:flex;gap:8px;margin-top:10px}
.sup-resolve-confirm{flex:1;padding:10px 12px;font-size:14px;font-weight:700;border:none;background:#43A047;color:#fff;border-radius:10px;cursor:pointer;font-family:inherit;transition:background .15s;min-height:44px}
.sup-resolve-confirm:hover{background:#2E7D32}
.sup-resolve-cancel{flex:0;padding:10px 14px;font-size:14px;font-weight:600;border:1px solid var(--grey-lt);background:#fff;color:var(--grey);border-radius:10px;cursor:pointer;font-family:inherit;min-height:44px}
.sup-schools-detail{display:none;margin-top:6px}
.sup-schools-detail.show{display:block}
.sup-dist-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:var(--teal-lt);border-radius:6px;margin-bottom:4px;font-size:12.5px;font-weight:600;color:var(--navy)}
.sup-dist-count{color:var(--teal);font-weight:700}
/* Scope dropdown */
.sup-scope-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.sup-scope-label{font-size:13px;font-weight:600;color:var(--grey);white-space:nowrap}
.sup-scope-select{font-size:14px;font-family:inherit;padding:8px 10px;border:1.5px solid var(--grey-lt);border-radius:8px;background:#fff;color:var(--navy);outline:none;flex:1;min-width:0;min-height:44px;cursor:pointer}
.sup-scope-select:focus{border-color:var(--teal)}
/* Reopen link */
.sup-reopen-link{font-size:12.5px;color:var(--teal);font-weight:600;cursor:pointer;margin-top:6px;display:inline-block;text-decoration:underline;text-decoration-style:dashed}

/* ─── ACTIVITY TRACKER — SOCIAL POST LAYOUT ─── */
/* Streak bar */
.streak-bar{background:#fff;border-radius:12px;border:1px solid var(--grey-lt);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.streak-info{flex:1}
.streak-title{font-size:14px;font-weight:700;color:var(--navy)}
.streak-sub{font-size:14px;color:var(--grey);margin-top:2px}
.streak-dots{display:flex;gap:4px;margin-top:6px}
.streak-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.streak-dot.sd-done{background:var(--green);color:#fff}
.streak-dot.sd-now{background:#FFF3E0;color:var(--orange-text);border:2px solid var(--orange)}
.streak-dot.sd-future{background:#f0f0f0;color:var(--grey-lt)}
.act-summary-bar{display:flex;gap:0;background:#fff;border-radius:12px;border:1px solid var(--grey-lt);overflow:hidden;margin-bottom:12px}
.act-summary-item{flex:1;text-align:center;padding:12px 6px;cursor:pointer;transition:background .15s;position:relative;font-family:inherit;border:none;background:none}
.act-summary-item:not(:last-child){border-right:1px solid #f0f0f0}
.act-summary-item:hover{background:#fafafa}
.act-summary-item.active{background:#f5f9f9}
.act-summary-item.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;border-radius:3px 3px 0 0}
.act-summary-item.active.s-all::after{background:var(--teal)}
.act-summary-item.active.s-progress::after{background:var(--orange)}
.act-summary-item.active.s-planned::after{background:var(--blue)}
.act-summary-item.active.s-done::after{background:var(--green)}
.act-summary-item.active.s-followup::after{background:#F57F17}
.act-summary-num{font-size:20px;font-weight:800;line-height:1}
.act-summary-num.c-teal{color:var(--teal)}.act-summary-num.c-orange{color:var(--orange-text)}.act-summary-num.c-blue{color:var(--blue)}.act-summary-num.c-green{color:var(--green-text)}
.act-summary-label{font-size:13px;color:var(--grey);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.act-stack-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:#ECEFF1;margin-bottom:14px}
.act-stack-seg{height:100%;transition:width .4s}
.tl-month-hdr{font-size:12.5px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.8px;padding:10px 0 6px;display:flex;align-items:center;gap:8px}
.tl-month-hdr::after{content:'';flex:1;height:1px;background:#e0e0e0}
/* Facebook-style activity cards */
.act-card{background:#fff;border-radius:12px;border:1px solid #e8e6e4;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.act-card.act-done{opacity:.75}
.act-post-hdr{display:flex;gap:10px;align-items:flex-start;padding:14px 14px 0}
.act-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.act-author{flex:1;min-width:0}
.act-author-name{font-size:14px;font-weight:700;color:var(--navy);line-height:1.3}
.act-author-role{font-size:13px;color:var(--grey)}
.act-post-body{padding:10px 14px}
.act-post-desc{font-size:14px;color:var(--navy);line-height:1.5;margin-bottom:8px}
.act-post-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.act-meta-tag{font-size:13px;padding:3px 8px;border-radius:12px;background:#f0f2f5;color:#606770}
.act-status-tag{font-size:12.5px;font-weight:700;padding:3px 10px;border-radius:12px;letter-spacing:.3px}
.act-status-tag.st-ip{background:#FFF3E0;color:var(--orange-text)}
.act-status-tag.st-pl{background:#E3F2FD;color:var(--blue)}
.act-status-tag.st-c{background:var(--green-lt);color:var(--green-text)}
.act-action-bar{display:flex;border-top:1px solid #f0f0f0;margin:0 14px}
.act-action-btn{flex:1;text-align:center;padding:10px 6px;font-size:14px;font-weight:600;color:#65676b;cursor:pointer;background:none;border:none;font-family:inherit;min-height:44px;transition:background .15s}
.act-action-btn:hover{background:#f0f2f5;border-radius:6px}
.act-action-btn.active{color:var(--teal)}
.act-card-detail{display:none;border-top:1px solid #f0f0f0;padding:12px 14px;background:#FAFBFC}
.act-card-detail.show{display:block}
.acd-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #f5f5f5}
.acd-label{color:#999}
.acd-value{color:var(--navy);font-weight:600;text-align:right;max-width:60%}
.acd-chain{margin:10px 0 6px}
.acd-chain-title{font-size:13px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.acd-chain-step{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.acd-chain-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.acd-chain-dot.cd-d{background:#1565C0}.acd-chain-dot.cd-de{background:var(--orange)}.acd-chain-dot.cd-a{background:var(--green)}
.acd-chain-lbl{font-size:13px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.3px}
.acd-chain-text{font-size:13px;color:var(--navy);line-height:1.4}
.acd-owner-btns{padding:8px 0 0;display:flex;gap:8px;border-top:1px solid #f0f0f0;margin-top:8px}
/* Thread */
.post-thread{display:none;border-top:1px solid #f0f0f0;padding:10px 14px;background:#FAFBFC}
.post-thread.show{display:block}
.pt-comment{display:flex;gap:8px;margin-bottom:10px}
.pt-comment:last-of-type{margin-bottom:6px}
.pt-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;color:#fff;flex-shrink:0;background:var(--teal)}
.pt-bubble{background:#f0f0f0;border-radius:4px 12px 12px 12px;padding:8px 12px;flex:1;min-width:0}
.pt-bubble-hdr{display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-bottom:2px}
.pt-name{font-size:13px;font-weight:700;color:var(--navy)}
.pt-time{font-size:13px;color:var(--grey-lt)}
.pt-text{font-size:13.5px;color:var(--navy);line-height:1.5}
.pt-role{font-size:13px;font-weight:600;color:var(--grey);background:#e0e0e0;padding:1px 5px;border-radius:3px;display:inline-block;margin-top:3px}
.pt-reply{display:flex;flex-direction:column;gap:6px;margin-top:6px;position:relative}
.pt-input{width:100%;box-sizing:border-box;font-size:14px;font-family:inherit;border:1.5px solid var(--grey-lt);border-radius:20px;padding:10px 14px;resize:none;min-height:44px;max-height:100px;line-height:1.4;outline:none;transition:border-color .15s}
.pt-input:focus{border-color:var(--teal)}
.pt-input::placeholder{color:#c0c0c0;font-size:14px}
.pt-actions{display:flex;justify-content:flex-end;align-items:center;gap:4px}
.pt-send{border-radius:20px;border:none;background:var(--teal);color:#fff;font-size:14px;font-weight:700;cursor:pointer;padding:10px 20px;min-height:44px;flex-shrink:0;font-family:inherit;white-space:nowrap}
.pt-send:hover{background:var(--teal-dk)}
/* Owner action buttons */
.poa-btn{font-family:inherit;font-size:13px;font-weight:700;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .15s;flex:1;text-align:center}
.poa-start{border:1.5px solid var(--orange);background:#fff;color:var(--orange-text)}
.poa-start:hover{background:var(--orange);color:#fff}
.poa-done{border:1.5px solid var(--green);background:#fff;color:var(--green-text)}
.poa-done:hover{background:var(--green);color:#fff}
/* Notification bell & pane */
.hdr-actions{display:flex;flex-direction:column;gap:6px;align-items:stretch;flex-shrink:0}
.hdr-actions .hdr-logout{text-align:center;padding:6px 10px}
.notif-bell{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:44px;height:38px;border-radius:19px;border:none;background:rgba(255,255,255,.16);color:rgba(255,255,255,.95);cursor:pointer;font-size:16px;transition:.15s;flex-shrink:0;font-family:inherit;padding:0 14px}
.notif-bell-label{font-size:14px;font-weight:700;color:#fff;letter-spacing:.2px}
.notif-bell:hover{background:rgba(255,255,255,.2);color:#fff}
.notif-badge{position:absolute;top:4px;right:4px;min-width:18px;height:18px;border-radius:9px;background:#E53935;color:#fff;font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;line-height:1;pointer-events:none}
.notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:900;animation:fadeIn .15s}
.notif-pane{position:fixed;top:0;right:0;width:100%;max-width:400px;height:100%;background:#fff;z-index:901;box-shadow:-4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column;animation:notifSlide .2s ease-out}
@keyframes notifSlide{from{transform:translateX(100%)}to{transform:translateX(0)}}
.notif-pane-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e8e6e4;flex-shrink:0;background:#FAFBFC}
.notif-pane-title{font-size:16px;font-weight:700;color:var(--navy)}
.ibx-back{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--teal-dk);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;padding:6px 4px}
.ibx-reply-bar{display:flex;gap:8px;padding:10px 14px calc(12px + env(safe-area-inset-bottom));border-top:1px solid #E2E7E5;background:#fff}
.notif-pane-close{display:inline-flex;align-items:center;gap:6px;background:var(--teal);color:#fff;border:none;border-radius:20px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1;transition:.15s}
.notif-pane-close:hover{background:var(--teal-dk)}
.notif-pane-close:hover{background:var(--grey-lt);color:var(--navy)}
.notif-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.notif-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid #f3f2f1;cursor:pointer;min-height:60px;transition:background .1s}
.notif-item:hover{background:#f8f9fc}
.notif-item:active{background:#f0f2f5}
.notif-item.unread{background:#FFF8E1}
.notif-item.unread:hover{background:#FFF3CD}
.notif-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:14px;font-weight:600;color:var(--navy);line-height:1.4}
.notif-desc{font-size:14px;color:var(--grey);line-height:1.4;margin-top:2px}
.notif-time{font-size:13px;color:var(--grey);margin-top:3px}
.notif-empty{padding:40px 20px;text-align:center;color:var(--grey);font-size:14px;line-height:1.6}
@media(max-width:480px){.notif-pane{max-width:100%}}

/* LOCATION CAPTURE INDICATOR ─────────────────────────────────────────── */
.loc-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;margin:14px 0 10px;border:1.5px solid #e1dfdd;background:#fafbfc;font-size:14px;line-height:1.45;transition:all .2s}
.loc-card.success{border-color:var(--green);background:var(--green-lt)}
.loc-card.requesting{border-color:var(--teal);background:var(--teal-lt)}
.loc-card.denied,.loc-card.unavailable,.loc-card.timeout,.loc-card.unsupported{border-color:#FFD180;background:#FFF8E1}
.loc-icon{font-size:20px;line-height:1;flex-shrink:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.loc-text{flex:1;min-width:0}
.loc-title{font-size:14px;font-weight:600;color:var(--navy);line-height:1.35}
.loc-sub{font-size:14px;color:var(--grey);margin-top:2px;line-height:1.4;font-family:'SF Mono','Consolas',monospace}
.loc-sub.warn{color:#B26500;font-family:inherit}
.loc-actions{display:flex;gap:6px;flex-shrink:0}
.loc-btn{padding:7px 12px;border-radius:6px;border:1px solid var(--teal);background:#fff;color:var(--teal);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;min-height:44px;white-space:nowrap}
.loc-btn:hover{background:var(--teal);color:#fff}
.loc-btn:active{transform:translateY(1px)}
.loc-btn:disabled{opacity:.5;cursor:not-allowed}
.loc-spinner{width:18px;height:18px;border:2.5px solid var(--teal-lt);border-top-color:var(--teal);border-radius:50%;animation:loc-spin .8s linear infinite}
@keyframes loc-spin{to{transform:rotate(360deg)}}
.loc-pin{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:10px;background:var(--green-lt);color:var(--green-dk);font-size:12.5px;font-weight:600;text-decoration:none}
.loc-pin:hover{background:var(--green);color:#fff}
@media(max-width:420px){.loc-card{flex-wrap:wrap}.loc-actions{width:100%;justify-content:flex-end;margin-top:4px}}

/* APP FOOTER WITH VERSION ─────────────────────────────────────────────── */
.app-footer{display:flex;justify-content:center;align-items:center;padding:20px 16px 28px;color:var(--grey);font-size:13px;line-height:1.5;text-align:center;border-top:1px solid #ebe9e7;margin-top:24px;background:#fafbfc}
.app-footer-inner{max-width:640px}
.app-footer-version{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--grey);font-size:13px;font-family:inherit;cursor:pointer;padding:4px 8px;border-radius:4px;transition:.15s;font-weight:500}
.app-footer-version:hover{background:#eef0f3;color:var(--teal-dk)}
.app-footer-version::before{content:'•';margin-right:4px;color:#c8c6c4}

/* VERSION INFO SHEET (tap version to open) ─────────────────────────────── */
.ver-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s}
.ver-sheet-overlay.visible{opacity:1;pointer-events:auto}
.ver-sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;z-index:10000;transform:translateY(100%);transition:transform .25s cubic-bezier(.2,.8,.2,1);max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.ver-sheet.visible{transform:translateY(0)}
.ver-sheet-handle{width:40px;height:4px;background:#d4d4d4;border-radius:2px;margin:10px auto 0}
.ver-sheet-body{padding:14px 22px 28px}
.ver-sheet h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px}
.ver-sheet-sub{font-size:14px;color:var(--grey);margin-bottom:18px;line-height:1.5}
.ver-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f3f2f1;font-size:14px}
.ver-row:last-child{border-bottom:none}
.ver-row-label{color:var(--grey);font-weight:500}
.ver-row-value{color:var(--navy);font-weight:600;font-family:'SF Mono','Consolas',monospace;font-size:14px}
.ver-row-value .uptodate{color:var(--green-dk);font-weight:700;margin-left:6px}
.ver-row-value .behind{color:var(--orange-text);font-weight:700;margin-left:6px}
.ver-sheet-btn{width:100%;margin-top:18px;padding:13px;border-radius:10px;border:none;background:var(--teal);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.ver-sheet-btn:hover{background:var(--teal-dk)}
.ver-sheet-btn:disabled{background:#d0d4db;cursor:not-allowed}
.ver-sheet-btn.secondary{background:#fff;border:1px solid #d0d7de;color:var(--navy);margin-top:8px}
.ver-sheet-btn.secondary:hover{background:#f3f4f6}

/* WHAT'S NEW MODAL (first open after update) ──────────────────────────── */
.whatsnew-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center;padding:0}
.whatsnew-overlay.visible{opacity:1;pointer-events:auto}
@media(min-width:600px){.whatsnew-overlay{align-items:center;padding:20px}}
.whatsnew-card{background:#fff;border-radius:16px 16px 0 0;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);box-shadow:0 -8px 32px rgba(0,0,0,.2)}
@media(min-width:600px){.whatsnew-card{border-radius:16px;transform:scale(.95);opacity:0;transition:transform .25s,opacity .25s}}
.whatsnew-overlay.visible .whatsnew-card{transform:translateY(0)}
@media(min-width:600px){.whatsnew-overlay.visible .whatsnew-card{transform:scale(1);opacity:1}}
.whatsnew-hero{background:linear-gradient(135deg,var(--teal-dk) 0%,#0F7B7D 100%);color:#fff;padding:28px 24px 22px;text-align:center;border-radius:16px 16px 0 0}
@media(min-width:600px){.whatsnew-hero{border-radius:16px 16px 0 0}}
.whatsnew-emoji{font-size:36px;margin-bottom:8px;display:block}
.whatsnew-hero h2{font-size:19px;font-weight:700;margin:0 0 4px}
.whatsnew-hero-version{font-size:14px;opacity:.85;font-family:'SF Mono','Consolas',monospace}
.whatsnew-body{padding:22px 24px 8px}
.whatsnew-body h4{font-size:14px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.whatsnew-notes{list-style:none;padding:0;margin:0}
.whatsnew-notes li{display:flex;gap:10px;padding:8px 0;font-size:14px;line-height:1.55;color:var(--navy)}
.whatsnew-notes li::before{content:'✓';color:var(--green-dk);font-weight:700;flex-shrink:0;margin-top:1px}
.whatsnew-footer{padding:6px 24px 22px}
.whatsnew-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--teal);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;box-shadow:0 2px 8px rgba(11,142,141,.25)}
.whatsnew-btn:hover{background:var(--teal-dk)}
.whatsnew-btn:active{transform:translateY(1px)}
/* ── Change #4 (2026.06.18.1): sticky form Next/Back ── */
.form-nav{display:flex;justify-content:space-between;gap:12px;margin-top:12px}

  /* Sub-nav: 3×2 grid instead of horizontal scroll */

  .sup-scope-select{font-size:14px;padding:10px 12px}
}

      try { if (S.view === 'log') render(); } catch(e){}   // refresh the form if it is already open

    });
}

sb.auth.onAuthStateChange(function(event){

    // fire from 'ready'. Anything else here is a session that expired or was
    // revoked mid-use — tell the person plainly instead of failing silently.
    if (S._expectedSignout) { S._expectedSignout = false; return; }

async function sendPinReset() {
  var em = String(S._forgotEmail || '').trim().toLowerCase();
  if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)) { S._forgotMsg = 'Please enter your work email address.'; render(); return; }
  S._forgotBusy = true; S._forgotMsg = ''; render();
  var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
  var timer = setTimeout(function(){ try { ctrl && ctrl.abort(); } catch(e){} }, 10000);
  try {
    var r = await fetch(NOTIFY_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=UTF-8'},
      body: JSON.stringify({ type:'pin_reset', email: em, v: APP_VERSION }), signal: ctrl ? ctrl.signal : undefined });
    clearTimeout(timer); S._forgotBusy = false;
    if (r && r.ok) S._forgotMsg = 'Done \u2014 check your email for a link to set a new PIN. It can take a minute or two.';
    else S._forgotMsg = 'The server refused the request (code ' + ((r && r.status) || '?') + '). Please tell the Interventions Manager.';
  } catch(e) {
    clearTimeout(timer); S._forgotBusy = false;
    S._forgotMsg = 'Could not reach the server (' + String((e && e.name) || 'error') + '). Check your connection and try again.';
  }
  render();
}

// Generate a branded PDF audit report for a submitted intervention.
// Returns a jsPDF doc instance, or null if jsPDF didn't load.
var _jspdfLoad=null;
function _loadScriptOnce(src){return new Promise(function(res,rej){var el=document.createElement('script');el.src=src;el.onload=function(){res(true);};el.onerror=function(){rej(new Error('load fail '+src));};document.head.appendChild(el);});}
function _hasAutoTable(){try{return !!(window.jspdf&&window.jspdf.jsPDF)&&typeof (new window.jspdf.jsPDF()).autoTable==='function';}catch(e){return false;}}
// Guarantees jsPDF + autoTable are available before we build a PDF. Fast path if already loaded; otherwise loads on demand with a fallback CDN.
function ensureJsPDF(){
  if(_hasAutoTable()) return Promise.resolve(true);
  if(_jspdfLoad) return _jspdfLoad;
  _jspdfLoad=(async function(){
    if(!(window.jspdf&&window.jspdf.jsPDF)){
      try{await _loadScriptOnce('https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js');}
      catch(e){try{await _loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js');}catch(e2){return false;}}
    }
    if(!_hasAutoTable()){
      try{await _loadScriptOnce('https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js');}
      catch(e){try{await _loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js');}catch(e2){}}
    }
    return _hasAutoTable();
  })();
  return _jspdfLoad;
}

    ['Curriculum Covered', det.insight_curriculum_pct ? (det.insight_curriculum_pct + '%') : ''],
    ['What You Found', det.insight_statement || dec.insight],
    ['Detail', det.insight_detail],
    ['What Made You Act', _arrJoin(det.intervention_triggers, '; ')],
    ['Planned Intervention(s)', _arrJoin(det.decision_types, '; ')],
    ['Action(s) Taken', _arrJoin(det.action_types, '; ') || act.action_taken]

  // ═══ Context & Follow-up ═══

  // School observation summary
  let obsSummary = '';

      obsSummary = yesC + ' in place, ' + noC + ' not in place (' + answered.length + '/10 checked)';
    }
  }
  kvTable([
    ['Support Needed', _arrJoin(det.support_needed, '; ')],
    ['Support Level', _supLevelLabel(det.support_level)],
    ['Context', ctxJoined],
    ['Context Notes', det.ctx_notes],
    ['School Observation', obsSummary],
    ['Educators Supported', det.educators_supported],
    ['Follow-up', det.follow_up ? ('Yes \u2014 ' + (det.follow_up_desc || '')) : 'No']
  ]);

  // ═══ Officials Notified (tagged) ═══
  const taggedRows = [];
  Object.keys(det.tagged_officials || {}).forEach(function(need) {
    (det.tagged_officials[need] || []).forEach(function(o) {
      taggedRows.push([need, o.name||'', o.role||'', o.email||'']);

      startY: y, margin: { left: margin, right: margin },

  // ═══ Supporting Document(s) ═══
  var _supDocs = (det && det.supporting_docs) || [];

  // ═══ Footer on every page ═══
  const total = doc.internal.getNumberOfPages();
  for (let i = 1; i <= total; i++) {
    doc.setPage(i);
    doc.setDrawColor.apply(doc, PDF_COLOR.rule);
    doc.setLineWidth(0.5).line(margin, pageH - 28, pageW - margin, pageH - 28);

    doc.text('DDD Learner Improvement Interventions Tracker \u00B7 Generated ' + submitted + ' SAST \u00B7 v' + APP_VERSION, margin, pageH - 16);
    doc.text('Page ' + i + ' of ' + total, pageW - margin, pageH - 16, { align:'right' });
  }
  return doc;
}

// Returns base64-encoded PDF (no data: prefix), ready for Resend `attachments` field
function getInterventionPDFBase64(dec, act, official) {
  const doc = generateInterventionPDF(dec, act, official);
  if (!doc) return null;
  const dataUri = doc.output('datauristring');
  return dataUri.split(',')[1] || null;
}

// Read a File object as base64 string (no data: prefix). Resolves to '' on failure.
function _fileToBase64(file) {
  return new Promise(function(resolve) {
    try {
      const reader = new FileReader();
      reader.onload = function() {
        const dataUri = String(reader.result || '');
        const idx = dataUri.indexOf(',');
        resolve(idx > -1 ? dataUri.substring(idx + 1) : '');
      };
      reader.onerror = function() { resolve(''); };
      reader.readAsDataURL(file);
    } catch(e) { resolve(''); }
  });
}

var _offSearchTimer = null;
async function searchOfficialsForNeed(need, query) {
  if (!query || query.length < 2) { S.f._offSearchResults[need] = []; S.f._offSearchLoading[need] = false; updateOffSearchUI(need); return; }
  S.f._offSearchLoading[need] = true; updateOffSearchUI(need);
  try {
    var {data} = await sb.rpc('search_officials', { search_query: query, filter_district: null });
    var seen = {}; var results = [];
    (data || []).forEach(function(o) { if (!seen[o.email]) { seen[o.email] = true; results.push({ id: o.id, name: o.full_name || '', role: o.role || '', email: o.email || '', circuit: o.circuit || '', district: o.district || '' }); } });
    S.f._offSearchResults[need] = results;
  } catch(e) { S.f._offSearchResults[need] = []; console.warn('Official search failed:', e); }
  S.f._offSearchLoading[need] = false; updateOffSearchUI(need);
}
function tagOfficial(need, official) {

}
function offSearchContainerId(need) { return 'off-sr-' + need.replace(/[^a-zA-Z0-9]/g, ''); }
function renderOffSearchResultsInner(need) {

var _mentionTimer = null;
var _mentionDoneNames = [];
function getRecentTagged() {

function addRecentTagged(official) {

    recents.unshift({id:official.id, name:official.name, role:official.role, email:official.email, ts:Date.now()});
