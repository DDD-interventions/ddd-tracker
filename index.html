// ═══════════════════════════════════
// LOCATION CAPTURE (GPS at submission)
// ═══════════════════════════════════
//
// Captures the official's phone GPS at the moment of submission as evidence
// of the visit. Behaviour:
//   - Triggered when the user reaches the Review step (formStep === 4)
//   - Shows a status card above the confirm checkbox so the user sees what's
//     being captured before they submit
//   - If GPS fails or is denied: submission still proceeds with a flag noting
//     location was unavailable (per design decision: optional, not mandatory)
//   - After 3 denials in the same session, stops prompting silently
//
// Privacy note: only the official's coordinates are captured. No verification
// against school coordinates is performed in this version.
// ─────────────────────────────────────────────────────────────────────────

function captureLocation(opts) {
  opts = opts || {};
  if (!('geolocation' in navigator)) {
    S._gpsStatus = 'unsupported';
    S._gpsError = 'This device does not support location services.';
    render();
    return;
  }

  // Don't keep prompting if user has repeatedly denied this session
  if (S._gpsDenialCount >= 3 && !opts.force) {
    S._gpsStatus = 'denied';
    render();
    return;
  }

  S._gpsStatus = 'requesting';
  S._gpsError = '';
  render();

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      S._gpsCoords = {
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy_m: Math.round(pos.coords.accuracy)
      };
      S._gpsCapturedAt = new Date().toISOString();
      S._gpsStatus = 'success';
      S._gpsError = '';
      render();
    },
    function(err) {
      // err.code: 1=PERMISSION_DENIED, 2=POSITION_UNAVAILABLE, 3=TIMEOUT
      if (err.code === 1) {
        S._gpsStatus = 'denied';
        S._gpsDenialCount++;
      } else if (err.code === 2) {
        S._gpsStatus = 'unavailable';
      } else if (err.code === 3) {
        S._gpsStatus = 'timeout';
      } else {
        S._gpsStatus = 'unavailable';
      }
      S._gpsError = err.message || '';
      render();
    },
    {
      enableHighAccuracy: true,
      timeout: 30000,      // 30 seconds — first GPS lock can be slow
      maximumAge: 60000    // accept a cached fix from the last 60 seconds
    }
  );
}

function retryLocationCapture() {
  S._gpsRetryCount++;
  captureLocation({ force: true });
}

// Render the location status card. Used in the Review step.
function renderLocationCard() {
  var st = S._gpsStatus;
  var c = S._gpsCoords;

  // Status: requesting
  if (st === 'requesting') {
    return '<div class="loc-card requesting">' +
      '<div class="loc-icon"><div class="loc-spinner"></div></div>' +
      '<div class="loc-text">' +
        '<div class="loc-title">Capturing your location\u2026</div>' +
        '<div class="loc-sub">If your phone asks, tap <strong>Allow</strong>. This takes a few seconds.</div>' +
      '</div>' +
    '</div>';
  }

  // Status: success — show coords, accuracy, and a map link
  if (st === 'success' && c) {
    var mapUrl = 'https://www.google.com/maps?q=' + c.latitude + ',' + c.longitude;
    var coordStr = c.latitude.toFixed(5) + ', ' + c.longitude.toFixed(5);
    return '<div class="loc-card success">' +
      '<div class="loc-icon">\uD83D\uDCCD</div>' +
      '<div class="loc-text">' +
        '<div class="loc-title">Location captured (\u00B1' + c.accuracy_m + 'm accuracy)</div>' +
        '<div class="loc-sub">' + coordStr + ' \u00B7 <a href="' + mapUrl + '" target="_blank" rel="noopener" style="color:var(--teal-dk);font-weight:600">View on map</a></div>' +
      '</div>' +
    '</div>';
  }

  // Status: denied / unavailable / timeout / unsupported — show retry option
  if (st === 'denied' || st === 'unavailable' || st === 'timeout' || st === 'unsupported') {
    var titleMap = {
      denied: 'Location permission was declined',
      unavailable: 'Location is currently unavailable',
      timeout: 'Location capture timed out',
      unsupported: 'Location is not supported on this device'
    };
    var subMap = {
      denied: 'Location helps verify this visit. You can enable it in your phone settings, or continue without it.',
      unavailable: 'Move to an area with better GPS signal and try again, or continue without it.',
      timeout: 'Your phone could not get a GPS fix in time. Try again or continue without location.',
      unsupported: 'This submission will be recorded without location data.'
    };
    var canRetry = st !== 'unsupported' && S._gpsDenialCount < 3;
    return '<div class="loc-card ' + st + '">' +
      '<div class="loc-icon">\uD83D\uDCCD</div>' +
      '<div class="loc-text">' +
        '<div class="loc-title">' + titleMap[st] + '</div>' +
        '<div class="loc-sub warn">' + subMap[st] + '</div>' +
      '</div>' +
      (canRetry ? '<div class="loc-actions"><button class="loc-btn" onclick="retryLocationCapture()">Try again</button></div>' : '') +
    '</div>';
  }

  // Status: idle (shouldn't normally render — capture is triggered automatically on review step)
  return '';
}

// ═══════════════════════════════════
// AUTO-UPDATE SYSTEM
// ═══════════════════════════════════

// Check if the form has unsaved user data (not just defaults)
function isFormDirty() {
  const f = S.f;
  if (S.view !== 'log' || f.formStep < 1 || S.submitted) return false;
  // Check if user has entered meaningful data beyond defaults (including Step 1 fields)
  return !!(f.intervention_theme || f.term || f.activity_type || f.description
    || f.action_types.length || f.decision_types.length || f.action_type || f.decision_type || f.ddd_used
    || f.schools || f.insight_detail || f.insight_pass_rate
    || (f.subjects && f.subjects.length) || (f.grades && f.grades.length)
    || (f.ddd_reports && f.ddd_reports.length) || f.educators_supported
    || f.follow_up_desc || f.doc_url);
}

// ─── OFFLINE SUBMISSION QUEUE ───
function getSubmitQueue() {
  try { return JSON.parse(localStorage.getItem('ddd_submit_queue')||'[]'); } catch(e) { return []; }
}
function saveSubmitQueue(queue) {
  try { localStorage.setItem('ddd_submit_queue', JSON.stringify(queue)); } catch(e) { console.warn('Could not save queue:', e); }
}
function addToSubmitQueue(dec, act) {
  var queue = getSubmitQueue();
  queue.push({dec:dec, act:act, queued_at:new Date().toISOString()});
  saveSubmitQueue(queue);
}
function removeFromSubmitQueue(idx) {
  var queue = getSubmitQueue();
  queue.splice(idx, 1);
  saveSubmitQueue(queue);
}
async function flushSubmitQueue() {
  var queue = getSubmitQueue();
  if (!queue.length) return;
  var flushed = 0;
  var failed = [];
  for (var i = 0; i < queue.length; i++) {
    try {
      var item = queue[i];
      var decOk = item.decInserted || false;
      var actOk = item.actInserted || false;

      // Insert decision if not already done
      if (!decOk) {
        var r1 = await sb.from('decisions').insert(item.dec);
        if (r1.error) {
          if (r1.error.code === '23505' || (r1.error.message && r1.error.message.indexOf('duplicate')>-1)) { decOk = true; }
          else { throw r1.error; }
        } else { decOk = true; }
      }

      // Insert action if not already done
      if (!actOk) {
        var r2 = await sb.from('actions').insert(item.act);
        if (r2.error) {
          if (r2.error.code === '23505' || (r2.error.message && r2.error.message.indexOf('duplicate')>-1)) { actOk = true; }
          else {
            // Decision succeeded but action failed — save partial state
            item.decInserted = true;
            failed.push(item);
            continue;
          }
        } else { actOk = true; }
      }

      if (decOk && actOk) { flushed++; }
      else { failed.push(item); }
    } catch(e) {
      failed.push(queue[i]);
    }
  }
  saveSubmitQueue(failed);
  if (flushed > 0) {
    showToast(flushed + ' saved activit' + (flushed > 1 ? 'ies' : 'y') + ' submitted successfully');
    await loadAll();
  }
  return {flushed:flushed, remaining:failed.length};
}
function renderPendingBanner() {
  var queue = getSubmitQueue();
  if (!queue.length) return '';
  return '<div style="background:#FFF3E0;border:1px solid #FFE082;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px"><div style="font-size:12px;color:#E65100;line-height:1.4"><strong>' + queue.length + ' activit' + (queue.length > 1 ? 'ies' : 'y') + ' saved offline</strong> — waiting to submit when connection improves</div><button onclick="flushSubmitQueue()" style="font-family:inherit;font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:6px;border:1.5px solid #E65100;background:#fff;color:#E65100;cursor:pointer;white-space:nowrap">Retry now</button></div>';
}


// ─── FORM DRAFT (Save & Continue Later) ───
// Email-keyed localStorage draft. Persists across browser close; 30-day TTL.
const DRAFT_TTL_MS = 30 * 24 * 60 * 60 * 1000;
function _draftKey() {
  var email = (S.official && S.official.email) || (S.f && S.f.official_email) || 'anon';
  return 'ddd_form_draft_' + String(email).toLowerCase();
}
function saveFormDraft() {
  try {
    const draft = {
      f: S.f, view: S.view, openSections: S.openSections,
      savedAt: new Date().toISOString(), version: APP_VERSION
    };
    localStorage.setItem(_draftKey(), JSON.stringify(draft));
    return true;
  } catch(e) { return false; }
}
function clearFormDraft() {
  try { localStorage.removeItem(_draftKey()); } catch(e) {}
}
function getStoredDraftMeta() {
  try {
    const raw = localStorage.getItem(_draftKey());
    if (!raw) return null;
    const draft = JSON.parse(raw);
    if (!draft || !draft.savedAt) return null;
    const age = Date.now() - new Date(draft.savedAt).getTime();
    if (age > DRAFT_TTL_MS) { clearFormDraft(); return null; }
    return { savedAt: draft.savedAt, step: (draft.f && typeof draft.f.formStep==='number') ? draft.f.formStep : 0 };
  } catch(e) { return null; }
}

// Restore form draft from localStorage (called on explicit resume)
function restoreFormDraft(opts) {
  opts = opts || {};
  try {
    const raw = localStorage.getItem(_draftKey());
    if (!raw) return false;
    const draft = JSON.parse(raw);
    const age = Date.now() - new Date(draft.savedAt).getTime();
    if (age > DRAFT_TTL_MS) { clearFormDraft(); return false; }
    if (draft.f) {
      // Preserve auth-related fields from current session
      const keepFields = ['official_name','official_email','official_role','official_specialisation','official_role_other','official_specialisation_other'];
      keepFields.forEach(k => { if (S.f[k]) draft.f[k] = S.f[k]; });
      S.f = draft.f;
    }
    if (draft.view) S.view = draft.view;
    if (draft.openSections) S.openSections = draft.openSections;
    if (!opts.silent) setTimeout(() => showToast('Your saved intervention has been restored'), 500);
    return true;
  } catch(e) { return false; }
}

// Background version checker
let _updateAvailable = false;
let _updateBannerShown = false;
let _lastRemoteVersion = null;

// Compare two YYYY.MM.DD.N version strings.
// Returns 1 if a > b, -1 if a < b, 0 if equal. Missing/garbled segments → 0.
function _compareVersions(a, b) {
  if (!a || !b) return 0;
  var ap = String(a).split('.').map(function(p){ return parseInt(p, 10) || 0; });
  var bp = String(b).split('.').map(function(p){ return parseInt(p, 10) || 0; });
  for (var i = 0; i < Math.max(ap.length, bp.length); i++) {
    var x = ap[i] || 0;
    var y = bp[i] || 0;
    if (x > y) return 1;
    if (x < y) return -1;
  }
  return 0;
}

function _getDismissedVersion() {
  try { return localStorage.getItem('ddd_dismissed_update'); } catch(e) { return null; }
}

async function checkForUpdates() {
  try {
    const resp = await fetch(VERSION_CHECK_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) return;
    const remoteVersion = (await resp.text()).trim();
    _lastRemoteVersion = remoteVersion;
    // Only show the banner when remote is STRICTLY NEWER than what's loaded.
    // A stale version.txt (older than the running app — common when a deploy
    // bumps the HTML but forgets to bump version.txt) must NOT trigger a nag.
    if (!remoteVersion || _compareVersions(remoteVersion, APP_VERSION) <= 0) return;
    // And don't re-nag for a remote version the user has already dismissed.
    if (remoteVersion === _getDismissedVersion()) return;
    _updateAvailable = true;
    handleUpdateAvailable();
  } catch(e) { /* Silently fail — user might be offline */ }
}

function handleUpdateAvailable() {
  if (_updateBannerShown) return;
  // Always ask the user before refreshing
  if (isFormDirty()) saveFormDraft();
  showUpdateBanner();
}

function showUpdateBanner() {
  _updateBannerShown = true;
  let banner = document.getElementById('update-banner');
  if (banner) { banner.classList.add('visible'); return; }
  var hasDraft = isFormDirty();
  banner = document.createElement('div');
  banner.id = 'update-banner';
  banner.className = 'update-banner';
  banner.innerHTML = '<div class="update-banner-text"><strong>New version available.</strong> '+(hasDraft?'Your form has been saved and will be restored after updating.':'Tap Update now to get the latest version.')+'</div><div class="update-banner-btns"><button class="update-banner-btn primary" onclick="applyUpdate()">Update now</button><button class="update-banner-btn secondary" onclick="dismissUpdateBanner()">Later</button></div>';
  document.body.appendChild(banner);
  requestAnimationFrame(() => requestAnimationFrame(() => banner.classList.add('visible')));
}

async function applyUpdate() {
  saveFormDraft();
  // User chose to update — clear any prior dismissal so the next genuinely
  // newer version can prompt them again.
  try { localStorage.removeItem('ddd_dismissed_update'); } catch(e) {}
  // Refresh the cached app FIRST, so a single reload lands on the new version
  // (the service worker serves cache-first; without this, the first reload
  // shows the old version and users had to tap update two or three times).
  try {
    // Cache-busting query: the service worker matches caches by URL, so a
    // unique URL guarantees this fetch reaches the network (not the old cache).
    var fresh = await fetch('./index.html?upd=' + Date.now(), { cache: 'reload' });
    if (fresh && fresh.ok) {
      var keys = await caches.keys();
      for (var i = 0; i < keys.length; i++) {
        if (keys[i].indexOf('ddd-tracker-') === 0) {
          var c = await caches.open(keys[i]);
          await c.put('./index.html', fresh.clone());
          await c.put('./', fresh.clone());
        }
      }
    }
  } catch (e) { /* offline or cache error — plain reload below still works */ }
  _intentionalReload = true;
  window.location.reload();
}

function dismissUpdateBanner() {
  const banner = document.getElementById('update-banner');
  if (banner) banner.classList.remove('visible');
  // Remember this exact remote version so we don't re-show the same banner.
  // A genuinely NEWER version detected later will still trigger a fresh
  // banner because checkForUpdates compares against the dismissed version.
  if (_lastRemoteVersion) {
    try { localStorage.setItem('ddd_dismissed_update', _lastRemoteVersion); } catch(e) {}
  }
  _updateBannerShown = false;
}

// ─── VERSION FOOTER + INFO SHEET ─────────────────────────────────────────
// Renders a small "v2026.05.25.1" pill in the page footer. Tapping it
// opens a bottom sheet showing version info + update status + check button.
function renderAppFooter() {
  if (document.getElementById('app-footer')) return;
  var footer = document.createElement('footer');
  footer.id = 'app-footer';
  footer.className = 'app-footer';
  footer.innerHTML = '<div class="app-footer-inner">' +
    'Data Driven Districts \u00B7 Learner Improvement Interventions Tracker<br>' +
    '<button class="app-footer-version" onclick="openVersionSheet()" title="Tap for version details">v' + APP_VERSION + '</button>' +
    '</div>';
  document.body.appendChild(footer);
}

function openVersionSheet() {
  closeVersionSheet(); // ensure no duplicate
  var overlay = document.createElement('div');
  overlay.id = 'ver-sheet-overlay';
  overlay.className = 'ver-sheet-overlay';
  overlay.onclick = function(e){ if (e.target === overlay) closeVersionSheet(); };

  var serverVer = _lastRemoteVersion || '\u2014';
  var statusHTML;
  if (_lastRemoteVersion && _compareVersions(_lastRemoteVersion, APP_VERSION) > 0) {
    statusHTML = '<span class="behind">Update available</span>';
  } else if (_lastRemoteVersion) {
    statusHTML = '<span class="uptodate">\u2713 Up to date</span>';
  } else {
    statusHTML = '';
  }

  var sheet = document.createElement('div');
  sheet.id = 'ver-sheet';
  sheet.className = 'ver-sheet';
  sheet.innerHTML = '<div class="ver-sheet-handle"></div>' +
    '<div class="ver-sheet-body">' +
      '<h3>About this app</h3>' +
      '<div class="ver-sheet-sub">DDD Learner Improvement Interventions Tracker</div>' +
      '<div class="ver-row"><span class="ver-row-label">Installed version</span><span class="ver-row-value">v' + APP_VERSION + '</span></div>' +
      '<div class="ver-row"><span class="ver-row-label">Latest available</span><span class="ver-row-value">v' + serverVer + ' ' + statusHTML + '</span></div>' +
      '<div class="ver-row"><span class="ver-row-label">Connection</span><span class="ver-row-value">' + (navigator.onLine ? '\u2713 Online' : 'Offline') + '</span></div>' +
      '<button class="ver-sheet-btn" onclick="manualUpdateCheck(this)">Check for updates</button>' +
      '<button class="ver-sheet-btn secondary" onclick="showReleaseNotesFromSheet()">View what\'s new</button>' +
      '<button class="ver-sheet-btn secondary" onclick="closeVersionSheet()">Close</button>' +
    '</div>';

  document.body.appendChild(overlay);
  document.body.appendChild(sheet);
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      overlay.classList.add('visible');
      sheet.classList.add('visible');
    });
  });
}

function closeVersionSheet() {
  var overlay = document.getElementById('ver-sheet-overlay');
  var sheet = document.getElementById('ver-sheet');
  if (sheet) sheet.classList.remove('visible');
  if (overlay) overlay.classList.remove('visible');
  setTimeout(function(){
    if (sheet && sheet.parentNode) sheet.parentNode.removeChild(sheet);
    if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
  }, 280);
}

async function manualUpdateCheck(btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Checking\u2026'; }
  await checkForUpdates();
  if (btn) {
    if (_lastRemoteVersion && _compareVersions(_lastRemoteVersion, APP_VERSION) > 0) {
      btn.textContent = 'Update available \u2014 reload?';
      btn.onclick = function(){ applyUpdate(); };
      btn.disabled = false;
    } else {
      btn.textContent = '\u2713 You\'re up to date';
      setTimeout(function(){ if (btn) { btn.textContent = 'Check for updates'; btn.disabled = false; } }, 1800);
    }
  }
}

function showReleaseNotesFromSheet() {
  closeVersionSheet();
  setTimeout(function(){ showWhatsNewModal(true); }, 300);
}

// ─── "WHAT'S NEW" MODAL ──────────────────────────────────────────────────
// Shows once after a version update, OR on demand from the version sheet.
// Notes come from release-notes.json: { "2026.05.25.1": { "highlights": [...] } }
var _releaseNotesCache = null;

async function loadReleaseNotes() {
  if (_releaseNotesCache) return _releaseNotesCache;
  try {
    var resp = await fetch(RELEASE_NOTES_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) return null;
    _releaseNotesCache = await resp.json();
    return _releaseNotesCache;
  } catch(e) { return null; }
}

async function showWhatsNewModal(force) {
  var lastSeen = null;
  try { lastSeen = localStorage.getItem('ddd_last_seen_version'); } catch(e) {}
  // Skip auto-show if this version has already been seen (unless forced from sheet)
  if (!force && lastSeen === APP_VERSION) return;

  var notes = await loadReleaseNotes();
  var entry = notes && notes[APP_VERSION];
  // If there's nothing to show and this is an auto-trigger, just mark seen and exit
  if (!entry || !entry.highlights || !entry.highlights.length) {
    try { localStorage.setItem('ddd_last_seen_version', APP_VERSION); } catch(e) {}
    if (force) showToast('No release notes available for this version');
    return;
  }

  var existing = document.getElementById('whatsnew-overlay');
  if (existing) existing.parentNode.removeChild(existing);

  var overlay = document.createElement('div');
  overlay.id = 'whatsnew-overlay';
  overlay.className = 'whatsnew-overlay';
  overlay.onclick = function(e){ if (e.target === overlay) closeWhatsNewModal(); };

  var dateStr = entry.released ? new Date(entry.released).toLocaleDateString('en-ZA', { day:'numeric', month:'long', year:'numeric' }) : '';
  var listHTML = entry.highlights.map(function(h){ return '<li>' + esc(h) + '</li>'; }).join('');

  overlay.innerHTML = '<div class="whatsnew-card">' +
    '<div class="whatsnew-hero">' +
      '<span class="whatsnew-emoji">\u2728</span>' +
      '<h2>' + esc(entry.title || 'What\'s new') + '</h2>' +
      '<div class="whatsnew-hero-version">v' + APP_VERSION + (dateStr ? ' \u00B7 ' + dateStr : '') + '</div>' +
    '</div>' +
    '<div class="whatsnew-body">' +
      '<h4>In this update</h4>' +
      '<ul class="whatsnew-notes">' + listHTML + '</ul>' +
    '</div>' +
    '<div class="whatsnew-footer"><button class="whatsnew-btn" onclick="closeWhatsNewModal()">Got it</button></div>' +
  '</div>';

  document.body.appendChild(overlay);
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ overlay.classList.add('visible'); });
  });

  // Mark this version as seen so we don't show again on next open
  try { localStorage.setItem('ddd_last_seen_version', APP_VERSION); } catch(e) {}
}

function closeWhatsNewModal() {
  var overlay = document.getElementById('whatsnew-overlay');
  if (!overlay) return;
  overlay.classList.remove('visible');
  setTimeout(function(){ if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 320);
}

// INIT 
window.addEventListener('online', function(){ showToast('Back online \u2014 syncing\u2026'); flushSubmitQueue(); });
checkAuth();
// Start version polling after a short delay (don't slow down initial load)
setTimeout(() => {
  checkForUpdates();
  setInterval(checkForUpdates, VERSION_CHECK_INTERVAL);
}, 10000);
// Render version footer + show "What's new" if this is a fresh version
setTimeout(function(){ renderAppFooter(); showWhatsNewModal(false); }, 1500);
