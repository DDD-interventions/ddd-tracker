function handleMentionInput(key, text, el) {
  var pos = el.selectionStart || text.length;
  var before = text.slice(0, pos);
  var atIdx = before.lastIndexOf('@');
  if (atIdx === -1 || (atIdx > 0 && before[atIdx-1] !== ' ' && before[atIdx-1] !== '\n')) {
    if (S._mention.active && S._mention.key === key) { S._mention.active = false; S._mention.results = []; updateMentionUI(key); }
    return;
  }
  var query = before.slice(atIdx + 1);
  // If query starts with an already-inserted mention name, don't re-trigger search
  var isCompletedMention = _mentionDoneNames.some(function(name) { return query === name || query.startsWith(name + ' '); });
  if (isCompletedMention) {
    if (S._mention.active && S._mention.key === key) { S._mention.active = false; S._mention.results = []; updateMentionUI(key); }
    return;
  }
  if (query.includes(' ') && query.split(' ').length > 3) {
    if (S._mention.active) { S._mention.active = false; S._mention.results = []; updateMentionUI(key); }
    return;
  }
  S._mention.active = true;
  S._mention.key = key;
  S._mention.elId = el.id;
  S._mention.query = query;

  if (query.length < 2) {
    S._mention.results = [];
    S._mention.recents = getRecentTagged();
    S._mention.loading = false;
    updateMentionUI(key);
    return;
  }
  S._mention.loading = true;
  S._mention.recents = [];
  updateMentionUI(key);
  clearTimeout(_mentionTimer);
  _mentionTimer = setTimeout(async function() {
    try {
      var dist = S.official.district || null;
      var {data} = await sb.rpc('search_officials', { search_query: query, filter_district: dist });
      var seen = {}; var results = [];
      (data || []).forEach(function(o) {
        if (!seen[o.email]) { seen[o.email] = true; results.push({ id: o.id, name: o.full_name || '', role: o.role || '', email: o.email || '', district: o.district || '', circuit: o.circuit || '' }); }
      });
      S._mention.results = results;
      S._mention.loading = false;
    } catch(e) { S._mention.results = []; S._mention.loading = false; }
    updateMentionUI(key);
  }, 250);
}

function insertMention(key, official) {
  var el = document.getElementById(S._mention.elId);
  if (!el) return;

  var text = el.value || '';
  var pos = el.selectionStart || text.length;
  var before = text.slice(0, pos);
  var atIdx = before.lastIndexOf('@');
  if (atIdx === -1) return;

  var replacement = '@' + official.name + ' ';
  var newText = text.slice(0, atIdx) + replacement + text.slice(pos);
  var elId = el.id;

  // Write back to the correct state based on element ID
  if (elId.startsWith('pend-reply-')) {
    if(!S._pendReplyData)S._pendReplyData={};if(!S._pendReplyData[key])S._pendReplyData[key]={status:'In Progress',comment:''};S._pendReplyData[key].comment=newText;
  } else if (elId.startsWith('reply-')) {
    S._supReplyText[key] = newText;
  } else if (elId.startsWith('resolve-ta-')) {
    S._supResolveComment[key] = newText;
  } else if (elId.startsWith('act-reply-')) {
    S._actReplyText[key] = newText;
  } else if (elId === 'ta-fup') {
    S.f.follow_up_desc = newText;
  } else if (elId === 'ta-ctx') {
    S.f.ctx_notes = newText;
  }

  // Track tagged official in the right bucket
  if (elId.startsWith('pend-reply-')) {
    if(!S._pendReplyData)S._pendReplyData={};if(!S._pendReplyData[key])S._pendReplyData[key]={status:'In Progress',comment:''};
    if(!S._pendReplyData[key].tagged)S._pendReplyData[key].tagged=[];
    if(!S._pendReplyData[key].tagged.some(function(o){return o.id === official.id;}))S._pendReplyData[key].tagged.push(official);
  } else if (elId.startsWith('act-reply-')) {
    if (!S._actTagged) S._actTagged = {};
    if (!S._actTagged[key]) S._actTagged[key] = [];
    if (!S._actTagged[key].some(function(o){return o.id === official.id;})) S._actTagged[key].push(official);
  } else if (elId === 'ta-fup' || elId === 'ta-ctx') {
    // Track tagged officials in form tagged_officials under a generic key
    if (!S.f.tagged_officials['_form_mentions']) S.f.tagged_officials['_form_mentions'] = [];
    if (!S.f.tagged_officials['_form_mentions'].some(function(o){return o.id === official.id;})) S.f.tagged_officials['_form_mentions'].push(official);
  } else {
    if (!S._supTagged[key]) S._supTagged[key] = [];
    if (!S._supTagged[key].some(function(o){return o.id === official.id;})) S._supTagged[key].push(official);
  }

  addRecentTagged(official);
  if (_mentionDoneNames.indexOf(official.name) === -1) _mentionDoneNames.push(official.name);
  S._mention = {active:false, key:'', elId:'', query:'', results:[], recents:[], loading:false};
  render();

  setTimeout(function() {
    var ta = document.getElementById(elId);
    if (ta) { var np = atIdx + replacement.length; ta.focus(); ta.setSelectionRange(np, np); }
  }, 30);
}

function mentionContainerId(key) { return 'mention-dd-' + key.replace(/[^a-zA-Z0-9]/g, ''); }

function renderMentionDropdown(key) {
  var cId = mentionContainerId(key);
  var inner = renderMentionDropdownInner(key);
  return '<div id="' + cId + '">' + inner + '</div>';
}

function renderMentionDropdownInner(key) {
  if (!S._mention.active || S._mention.key !== key) return '';
  var results = S._mention.results || [];
  var recents = S._mention.recents || [];
  var query = S._mention.query || '';
  var loading = S._mention.loading;
  var keyEsc = key.replace(/'/g, "\\x27").replace(/\u2014/g, '\u2014');

  var html = '';
  var items = [];

  if (query.length < 2 && !loading) {
    // Show recents + prompt
    if (recents.length) {
      html += '<div style="border:1px solid #e8e6e4;border-radius:8px;overflow:hidden;margin-top:4px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1)">';
      html += '<div style="padding:6px 12px;font-size:11.5px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.5px;background:#f8f7f6;border-bottom:1px solid #e8e6e4">Recently tagged</div>';
      recents.forEach(function(o) {
        var oJson = JSON.stringify(o).replace(/'/g,"\\x27").replace(/"/g,'&quot;');
        var initials = (o.name||'?').split(' ').map(function(w){return w[0]||''}).join('').slice(0,2).toUpperCase();
        html += '<div onclick="insertMention(\'' + keyEsc + '\',' + oJson + ')" style="padding:10px 12px;border-bottom:1px solid #f3f2f1;cursor:pointer;min-height:44px;display:flex;align-items:center;gap:10px">';
        html += '<div style="width:32px;height:32px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">' + initials + '</div>';
        html += '<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;color:var(--navy)">' + esc(o.name) + '</div>';
        html += '<div style="font-size:12px;color:var(--grey)">' + esc(o.role) + (o.district ? ' \xb7 ' + esc(o.district) : '') + '</div></div></div>';
      });
      html += '</div>';
    }
    html += '<div style="font-size:11.5px;color:var(--grey);padding:4px 0;font-style:italic">' + (recents.length ? 'Or keep typing to search...' : 'Type a name or email address after @') + '</div>';
    return html;
  }
  if (loading && !results.length) {
    return '<div style="font-size:11.5px;color:var(--grey);padding:4px 0">Searching...</div>';
  }
  if (!results.length && query.length >= 2) {
    return '<div style="font-size:11.5px;color:var(--grey);padding:6px 0">No one found matching \u201c' + esc(query) + '\u201d \u2014 try their email address</div>';
  }
  if (!results.length) return '';

  html += '<div style="border:1px solid #e8e6e4;border-radius:8px;overflow:hidden;margin-top:4px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1)">';
  results.forEach(function(o) {
    var oJson = JSON.stringify(o).replace(/'/g,"\\x27").replace(/"/g,'&quot;');
    var initials = (o.name||'?').split(' ').map(function(w){return w[0]||''}).join('').slice(0,2).toUpperCase();
    html += '<div onclick="insertMention(\'' + keyEsc + '\',' + oJson + ')" style="padding:10px 12px;border-bottom:1px solid #f3f2f1;cursor:pointer;min-height:44px;display:flex;align-items:center;gap:10px">';
    html += '<div style="width:32px;height:32px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">' + initials + '</div>';
    html += '<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;color:var(--navy)">' + esc(o.name) + '</div>';
    html += '<div style="font-size:12px;color:var(--grey)">' + esc(o.role) + (o.district ? ' \xb7 ' + esc(o.district) : '') + ' \xb7 ' + esc(o.email) + '</div></div></div>';
  });
  html += '</div>';
  return html;
}

function updateMentionUI(key) {
  var cId = mentionContainerId(key);
  var container = document.getElementById(cId);
  if (container) { container.innerHTML = renderMentionDropdownInner(key); }
}

// ── VOICE RECORDING ──
// Design notes:
//  * Final transcripts are inserted into the textarea LIVE as the user speaks
//    (in onresult), not buffered until onend. This restores the
//    immediate-feedback property the original code had via its confirm()
//    dialog — without the multi-dialog problem. The textarea is editable, so
//    users can correct typos directly (Facebook-UX-as-reference principle).
//  * AUTO-RESTART on premature end. The Web Speech API auto-stops after
//    ~8–10s of detected silence even with continuous=true, and Android
//    Chrome's silence detection is unreliable (soft speech / breath pauses
//    register as silence). Without auto-restart users perceive the feature
//    as "cuts off after 10 seconds". We track whether the user *intended* to
//    stop (_voiceShouldRestart). When onend fires with the flag still set
//    and time remaining on the 90s cap, we transparently start a fresh
//    recognizer for the same target. The user sees one continuous session.
//  * When switching from field A → field B without first tapping stop, we
//    detach A's onresult/onerror/onend BEFORE calling stop(). Otherwise A's
//    async onend would later run and tear down B's session via the shared
//    global state. This was the main "voice doesn't work across fields" bug.
//  * 'network' errors are SILENT (matching the original behavior). They do
//    not mean the user is offline — they mean the browser's speech service is
//    unreachable, often intermittently. A loud toast on every miss makes a
//    usable feature feel broken; the gentle "didn't catch that" hint
//    (>2s recordings with no result) is enough nudge to retry.
var _voiceRec = null;
var _voiceTarget = null;
var _voiceField = null;
var _voiceTimer = null;
var _voiceCountdown = null;
var _voiceMaxSec = 90;
var _voiceSecLeft = 0;
var _voiceTranscript = '';
var _voiceCaptured = false;
var _voiceStartedAt = 0;
var _voiceErrored = false;
// True while the user wants the session to continue; cleared when they
// tap stop, switch fields, or hit a fatal/permanent error. Used by onend
// to decide between "auto-restart" and "finalize".
var _voiceShouldRestart = false;
// Tracks consecutive recognizer ends that produced no transcript. If this
// climbs too high (e.g. persistent network failure, hardware permission glitch
// that doesn't surface as 'not-allowed'), we stop auto-restarting to avoid
// hammering the speech service / draining battery on a hopeless loop.
var _voiceConsecutiveEmpty = 0;
var _VOICE_MAX_EMPTY_RESTARTS = 4;
// Handle for the setTimeout that re-starts the recognizer after a silence
// cutoff. Tracked so toggleVoice can cancel it if the user taps stop or
// switches fields during the brief gap between stop and restart.
var _voicePendingRestart = null;
var _VOICE_RESTART_DELAY_MS = 300;
var _speechSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
var _voiceUsedBefore = (function(){try{return localStorage.getItem('ddd_voice_used')==='1'}catch(e){return false}})();

function showVoiceHint(btnId) {
  var btn = document.getElementById(btnId);
  if (!btn) return;
  var hint = document.createElement('div');
  hint.className = 'voice-hint';
  hint.innerHTML = 'Your phone may ask for microphone access. <strong>Tap Allow</strong> to continue. Speak clearly — you have up to <strong>1 minute 30 seconds</strong>. Tap the button again when done.';
  btn.parentNode.style.position = 'relative';
  btn.parentNode.appendChild(hint);
  setTimeout(function(){ if(hint.parentNode) hint.parentNode.removeChild(hint); }, 7000);
}

function updateVoiceCountdownUI() {
  var el = document.getElementById('voice-countdown');
  if (!el) return;
  var m = Math.floor(_voiceSecLeft / 60);
  var s = _voiceSecLeft % 60;
  var timeStr = m + ':' + (s < 10 ? '0' : '') + s;
  el.textContent = timeStr;
  if (_voiceSecLeft <= 15) el.style.color = '#E53935';
  else if (_voiceSecLeft <= 30) el.style.color = '#E8952E';
  else el.style.color = '#E53935';
}

// Tear down timers, badge and recording state on the button — but do NOT
// touch _voiceRec / _voiceField / _voiceTarget / _voiceTranscript here so the
// caller can still read them to commit the transcript.
function _resetVoiceUI() {
  if (_voiceTimer) { clearTimeout(_voiceTimer); _voiceTimer = null; }
  if (_voiceCountdown) { clearInterval(_voiceCountdown); _voiceCountdown = null; }
  var badge = document.getElementById('voice-countdown');
  if (badge && badge.parentNode) badge.parentNode.removeChild(badge);
  if (_voiceTarget) {
    var btn = document.getElementById('mic-' + _voiceTarget);
    if (btn) btn.classList.remove('recording');
    if (btn && btn.parentNode) {
      var lbl = btn.parentNode.querySelector('[data-voice-label]');
      if (lbl) lbl.style.display = '';
    }
  }
}

// Insert the accumulated transcript into the current target textarea + state.
function _commitVoiceTranscript() {
  if (!_voiceTranscript || !_voiceField || !_voiceTarget) return;
  var el = document.getElementById(_voiceTarget);
  var existing = el ? el.value : '';
  var newVal = existing ? existing.trimEnd() + ' ' + _voiceTranscript : _voiceTranscript;
  if (el) {
    el.value = newVal;
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 240) + 'px';
    // Fire input event so any oninput handlers (e.g. mention dropdown) run.
    try { el.dispatchEvent(new Event('input', { bubbles: true })); } catch(e) {}
  }
  var parts = _voiceField.split('.');
  if (parts.length === 2) S[parts[0]][parts[1]] = newVal;
  else if (parts.length === 1) S.f[parts[0]] = newVal;
}

// Called by onend — finalize the session: commit text, then clear state.
function _finalizeVoice() {
  // hadTranscript is true if EITHER the unflushed accumulator has text OR we
  // already live-committed at least one chunk via onresult. Without this, a
  // successful session that already inserted everything live would falsely
  // fall into the "didn't catch that" branch below.
  var hadTranscript = !!_voiceTranscript || _voiceCaptured;
  var duration = _voiceStartedAt ? (Date.now() - _voiceStartedAt) : 0;
  var errored = _voiceErrored;
  if (_voicePendingRestart) { clearTimeout(_voicePendingRestart); _voicePendingRestart = null; }
  _commitVoiceTranscript();
  _resetVoiceUI();
  _voiceRec = null;
  _voiceField = null;
  _voiceTarget = null;
  _voiceTranscript = '';
  _voiceCaptured = false;
  _voiceStartedAt = 0;
  _voiceErrored = false;
  _voiceShouldRestart = false;
  // Helpful nudge only when the user clearly tried to record but nothing came back.
  if (!hadTranscript && !errored && duration > 2000) {
    showToast('Voice input didn\u2019t pick up audio \u2014 please type instead, or try again');
  }
}

// Build, wire and start a fresh SpeechRecognition instance for the
// currently-active _voiceTarget / _voiceField. Used both on initial start
// (toggleVoice) and on auto-restart (from onend when the recognizer ended
// prematurely but the user still wants to be recording).
function _createAndStartVoiceRec() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var rec = new SR();
  rec.lang = 'en-ZA';
  rec.continuous = true;
  rec.interimResults = false;

  rec.onresult = function(e) {
    var newChunks = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        var chunk = (e.results[i][0].transcript || '').trim();
        if (chunk) newChunks += (newChunks ? ' ' : '') + chunk;
      }
    }
    if (newChunks) {
      _voiceCaptured = true;
      _voiceConsecutiveEmpty = 0; // got a result — reset the dead-loop guard
      _voiceTranscript = newChunks;
      _commitVoiceTranscript();
      _voiceTranscript = '';
    }
  };

  rec.onerror = function(e) {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      _voiceErrored = true;
      _voiceShouldRestart = false; // permission denied — don't loop
      showToast('Microphone access was not allowed \u2014 please check your phone Settings');
    } else if (e.error === 'audio-capture') {
      _voiceErrored = true;
      _voiceShouldRestart = false; // hardware issue — don't loop
      showToast('Could not access the microphone \u2014 please check your phone Settings');
    } else if (e.error === 'no-speech' || e.error === 'aborted' || e.error === 'network') {
      // Recoverable. Stay silent (matches original behaviour) and let onend's
      // auto-restart logic decide whether to continue.
      if (e.error === 'network' && window.console && console.warn) {
        console.warn('SpeechRecognition: network error \u2014 speech service unreachable; will retry');
      }
    } else {
      // language-not-supported, bad-grammar, or any future error code: treat
      // as fatal so we don't burn cycles restarting into the same failure.
      _voiceErrored = true;
      _voiceShouldRestart = false;
      showToast('Voice input isn\u2019t working right now \u2014 please type instead');
    }
    // Do NOT call stop/finalize here — onend always runs after onerror.
  };

  // Diagnostics: log lifecycle so we can tell from DevTools whether the
  // mic is reaching the recognizer at all, vs. transcripts not coming back.
  // If onaudiostart fires but onresult never does, the audio path is fine
  // and the speech service is the failure. If onaudiostart never fires,
  // the mic isn't reaching the new recognizer (typically a stop→start
  // timing issue on Android Chrome).
  if (window.console && console.debug) {
    rec.onaudiostart = function() { console.debug('[voice] audiostart'); };
    rec.onspeechstart = function() { console.debug('[voice] speechstart'); };
    rec.onspeechend = function() { console.debug('[voice] speechend'); };
  }

  rec.onend = function() {
    // If the user still wants to be recording AND there's time remaining on
    // the 90s cap, transparently spin up a fresh recognizer. Web Speech in
    // Chrome/Android auto-stops after ~8–10s of perceived silence even with
    // continuous=true; without this, a single pause kills the session.
    //
    // We defer the new start() by ~300ms because Chrome on Android sometimes
    // hasn't released the mic stream yet by the time onend fires. Starting
    // a fresh recognizer immediately can produce a "live" recognizer that
    // never actually receives audio — onaudiostart fires but no transcript
    // ever arrives. The short pause lets the audio pipeline reset cleanly.
    _voiceConsecutiveEmpty++;
    if (_voiceShouldRestart && _voiceSecLeft > 0 && _voiceField && _voiceTarget
        && _voiceConsecutiveEmpty <= _VOICE_MAX_EMPTY_RESTARTS) {
      // Clear the active rec so toggleVoice doesn't think we're still going.
      _voiceRec = null;
      _voicePendingRestart = setTimeout(function() {
        _voicePendingRestart = null;
        // Re-check: user may have tapped stop or switched fields during the gap.
        if (!_voiceShouldRestart || _voiceSecLeft <= 0 || !_voiceField || !_voiceTarget) {
          _finalizeVoice();
          return;
        }
        try {
          _voiceRec = _createAndStartVoiceRec();
        } catch (e) {
          if (window.console && console.warn) console.warn('Voice auto-restart failed:', e);
          _voiceShouldRestart = false;
          _finalizeVoice();
        }
      }, _VOICE_RESTART_DELAY_MS);
      return;
    }
    _voiceShouldRestart = false;
    _finalizeVoice();
  };

  rec.start();
  return rec;
}

function toggleVoice(fieldPath, textareaId) {
  if (!_speechSupported) { showToast('Voice input is not available on this browser \u2014 try using Chrome on your phone'); return; }

  // Same-field tap = stop request. This covers two states:
  //  (a) recognizer is live (_voiceRec is set) — clear flag, stop it, let
  //      onend run _finalizeVoice.
  //  (b) we're in the gap between auto-restarts (_voiceRec null but
  //      _voicePendingRestart active) — cancel the pending restart and
  //      finalize directly so the user's stop tap takes effect immediately.
  if (_voiceField === fieldPath && (_voiceRec || _voicePendingRestart)) {
    _voiceShouldRestart = false;
    if (_voicePendingRestart) {
      clearTimeout(_voicePendingRestart);
      _voicePendingRestart = null;
      _finalizeVoice();
    } else {
      try { _voiceRec.stop(); } catch(e) {}
    }
    return;
  }

  // Switching fields: detach old handlers FIRST so the old recognizer's async
  // onend can't later run and tear down the new session via shared globals.
  // Also cancel any pending auto-restart so it doesn't fire mid-switch.
  // Commit anything captured for the previous field, then reset state synchronously.
  if (_voiceRec || _voicePendingRestart) {
    _voiceShouldRestart = false;
    if (_voicePendingRestart) {
      clearTimeout(_voicePendingRestart);
      _voicePendingRestart = null;
    }
    if (_voiceRec) {
      var oldRec = _voiceRec;
      oldRec.onresult = null;
      oldRec.onerror = null;
      oldRec.onend = null;
      try { oldRec.stop(); } catch(e) {}
    }
    _commitVoiceTranscript();
    _resetVoiceUI();
    _voiceRec = null;
    _voiceField = null;
    _voiceTarget = null;
    _voiceTranscript = '';
    _voiceCaptured = false;
    _voiceStartedAt = 0;
    _voiceErrored = false;
  }

  if (!_voiceUsedBefore) {
    _voiceUsedBefore = true;
    try { localStorage.setItem('ddd_voice_used','1') } catch(e) {}
    showVoiceHint('mic-' + textareaId);
  }

  _voiceField = fieldPath;
  _voiceTarget = textareaId;
  _voiceSecLeft = _voiceMaxSec;
  _voiceTranscript = '';
  _voiceCaptured = false;
  _voiceStartedAt = Date.now();
  _voiceErrored = false;
  _voiceShouldRestart = true;
  _voiceConsecutiveEmpty = 0;

  var btn = document.getElementById('mic-' + textareaId);
  if (btn) btn.classList.add('recording');
  // Show countdown badge
  if (btn && btn.parentNode) {
    var badge = document.createElement('div');
    badge.id = 'voice-countdown';
    badge.style.cssText = 'font-size:12px;font-weight:700;color:#E53935;text-align:center;margin-top:2px;font-variant-numeric:tabular-nums';
    btn.parentNode.appendChild(badge);
    updateVoiceCountdownUI();
  }
  // Hide the "Record voice note" label while recording
  if (btn && btn.parentNode) {
    var lbl = btn.parentNode.querySelector('[data-voice-label]');
    if (lbl) lbl.style.display = 'none';
  }
  // Start countdown timer. When time runs out, clear the restart flag so
  // onend correctly finalizes instead of looping. Also covers the case where
  // we're in the gap between auto-restarts (no live _voiceRec) — cancel the
  // pending restart and finalize directly.
  _voiceCountdown = setInterval(function(){
    _voiceSecLeft--;
    updateVoiceCountdownUI();
    if (_voiceSecLeft <= 0) {
      _voiceShouldRestart = false;
      if (_voicePendingRestart) {
        clearTimeout(_voicePendingRestart);
        _voicePendingRestart = null;
        _finalizeVoice();
      } else if (_voiceRec) {
        try { _voiceRec.stop(); } catch(e) {}
      }
    }
  }, 1000);
  // Auto-stop safety net (fires 1s after the countdown should already have
  // hit zero — belt-and-braces in case the interval misses a tick).
  _voiceTimer = setTimeout(function(){
    _voiceShouldRestart = false;
    if (_voicePendingRestart) {
      clearTimeout(_voicePendingRestart);
      _voicePendingRestart = null;
      _finalizeVoice();
    } else if (_voiceRec) {
      try { _voiceRec.stop(); } catch(e) {}
    }
  }, (_voiceMaxSec + 1) * 1000);

  try {
    _voiceRec = _createAndStartVoiceRec();
  } catch(e) {
    _voiceShouldRestart = false;
    showToast('Could not start voice recording \u2014 please try again');
    _resetVoiceUI();
    _voiceRec = null;
    _voiceField = null;
    _voiceTarget = null;
    _voiceTranscript = '';
    _voiceStartedAt = 0;
  }
}

// Kept as a thin programmatic stop entry point (used nowhere else now, but
// preserved in case external code references it).
function stopVoice() {
  _voiceShouldRestart = false;
  if (_voicePendingRestart) { clearTimeout(_voicePendingRestart); _voicePendingRestart = null; }
  if (_voiceRec) { try { _voiceRec.stop(); } catch(e) {} }
}
function micBtn(fieldPath, taId) {
  if (!_speechSupported) return '';

function triggerCommentAttach(key) {

async function handleCommentFileSelect(key, file) {
  if (!file) return;
  if (file.size > 6*1024*1024) { showToast('File too large — maximum 6MB'); return; }
  S._commentAttach[key] = { name: file.name, url: '', uploading: true };

    var {data, error} = await sb.storage.from('Supporting-Documents').upload(path, file, { cacheControl:'3600', upsert:false, contentType:file.type||'application/octet-stream' });
    if (error) throw error;
    var {data:urlData} = sb.storage.from('Supporting-Documents').getPublicUrl(path);
    S._commentAttach[key] = { name: file.name, url: urlData && urlData.publicUrl || '', uploading: false };
  } catch(e) {
    console.warn('Comment attachment upload failed:', e);
    delete S._commentAttach[key];
    showToast('Upload failed — try again');
  }
  render();
}
function removeCommentAttach(key) { delete S._commentAttach[key]; render(); }
function getCommentTextWithAttach(key, text) {
  var attach = S._commentAttach[key];
  if (attach && attach.url) return text + '\n[ATTACH:' + attach.url + ':' + attach.name + ']';
  return text;
}
function renderCommentBody(text) {
  if (!text) return '';
  var parts = text.split(/\[ATTACH:([^:]+):([^\]]+)\]/g);
  var html = '';
  for (var i = 0; i < parts.length; i++) {
    if (i % 3 === 0) {

      html += t;
    } else if (i % 3 === 1) {
      // URL
      var url = parts[i];
      var fname = parts[i+1] || 'File';
      var fnameShort = fname.length > 35 ? fname.slice(0,32)+'...' : fname;
      html += '<div style="margin-top:4px"><a href="' + esc(url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:#f0f7f7;border:1px solid var(--teal-md);border-radius:6px;font-size:12px;color:var(--teal);font-weight:600;text-decoration:none">\uD83D\uDCCE ' + esc(fnameShort) + '</a></div>';

    }

function renderAttachButton(key) {

async function checkAuth() {
 S.authState = 'checking';
 S.loading = true;
 render();

 try {
   const { data: { session } } = await sb.auth.getSession();
   if (session) {
     // ── SECURITY FIX ────────────────────────────────────────────────
     // Filter by the authenticated user's email so we ONLY load that
     // official's record. Previously this query had no filter and would
     // return whatever official happened to be first in the table,
     // causing cross-account session leakage (a user could be auto-
     // logged-in as a different official after a period of inactivity).
     // ────────────────────────────────────────────────────────────────
     const sessionEmail = (session.user && session.user.email || '').toLowerCase();
     if (!sessionEmail) {
       // Defensive: session somehow has no email. Sign out and force re-auth.
       console.warn('Session has no email — signing out');
       await sb.auth.signOut();
       S.authState = 'gate';
       S.loading = false;
       render();
       return;
     }

     const { data, error } = await sb.from('officials')
       .select('id,full_name,role,province,district,email,is_active,details')
       .eq('email', sessionEmail)
       .limit(1);

     if (!error && data && data.length > 0) {
       const official = data[0];
       // Extra defensive check: ensure the row we got actually matches
       // the session email. Prevents data integrity issues from
       // surfacing as silent identity swaps.
       if ((official.email || '').toLowerCase() !== sessionEmail) {
         console.warn('Official row email does not match session email — signing out');
         await sb.auth.signOut();
         S.authState = 'gate';
         S.loading = false;
         render();
         return;
       }
       S._officialId = official.id;
       S.official = { full_name: official.full_name || 'Official', role: official.role || '', province: official.province || '', district: official.district || '', email: official.email || '', notify_tagged_disabled: !!(official.details && official.details.notify_tagged_disabled) };
       logEvent(S._freshLogin ? 'login' : 'app_open'); S._freshLogin = false;
       S.f.official_name = official.full_name || '';
       S.f.official_role = official.role || '';
       S.f.official_email = official.email || '';
       if (official.province) S.f.province = official.province;
       if (official.district) S.f.district = official.district;
       initDashFilters();
       S.authState = 'ready';
       S._sessionExpired = false;
       loadSchools();
       resetInactivityTimer();
       // Reloads and session restores land directly on the home feed.
       // (The welcome screen shows only after a fresh PIN sign-in.)
       S.showWelcome = false;
       render();
       (S._suppressScrollRestore=true,window.scrollTo({top:0,behavior:'instant'}));
       await loadAll();
       return;
     }
     // Session exists but no matching official record found — sign out
     // so the user goes back to the gate to authenticate cleanly.
     if (!error) {
       console.warn('No official record matches session email — signing out');
       await sb.auth.signOut();
     }
   }
 } catch(e) { console.warn('Session check failed:', e); }

 S.authState = 'gate';
 S.loading = false;
 render();
}

async function verifyEmail(email) {
 const cleanEmail = email.trim().toLowerCase();
 if (!cleanEmail) {
   S.gateError = 'Please enter your email address.'; S.gateLoading = false; render();
   return;
 }
 try {
   const { data, error } = await sb.rpc('check_official_exists', { p_email: cleanEmail });
   if (error) throw new Error(error.message || JSON.stringify(error));
   if (!data) {
     S.gateError = 'This email is not registered. Contact the DDD Interventions Manager on victor@newleaders.co.za for access.';
     S.gateLoading = false; render();
     return;
   }
   S._otpEmail = cleanEmail;
   S._otpValue = '';
   S.gateError = '';
   S.gateLoading = false;
   S.authState = 'otp';
   render();
 } catch(e) {
   console.error('Gate error:', e);
   S.gateError = 'Could not verify: ' + (e.message||e);
   S.gateLoading = false; render();
 }
}

// Absolute date-time for feed and inbox (global: used by renderHomeFeed and renderNotifPane)
function fmtWhen(ts){ try{ var dt=new Date(ts); if(isNaN(dt))return '';
    var now=new Date(); var hm=('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2);
    var d0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    var d1=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate());
    var days=Math.round((d0-d1)/86400000);
    if(days===0)return 'Today, '+hm;
    if(days===1)return 'Yesterday, '+hm;
    var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    var s=DW[dt.getDay()]+' '+dt.getDate()+' '+MO[dt.getMonth()];

  }

  // Programme pulse: the year so far

  }

  // Milestone
  var mStart = new Date(); mStart.setDate(1); mStart.setHours(0,0,0,0);
  var monthLabel = mStart.toLocaleString('en-ZA', { month: 'long', year: 'numeric' });
  var distName = (o.district || '').trim();
  var scopeDecs = (S.decisions || []).filter(function(d){
    try { if (new Date(d.created_at) < mStart) return false; } catch(e){ return false; }

  });
  if (scopeDecs.length >= 3) {
    items.push(item({
      avatar: av(ini(distName||'DDD'),4,!distName),
      name: esc(distName || 'The programme') + ': ' + scopeDecs.length + ' interventions this month',
      meta: esc(monthLabel),

  var h = '<div class="feed-wrap"><div class="feed-canvas">';

  if (termCount > 0) h += '<span class="feed-chip">' + termCount + ' visit' + (termCount === 1 ? '' : 's') + ' this term</span>';
  h += '<span class="feed-refresh">' + esc(feedAgoLabel()) + (S._feedRefreshing ? ' \u00b7 Refreshing\u2026' : ' \u00b7 <button onclick="refreshFeed()">Refresh</button>') + '</span></div>';
  h += '<button class="feed-record" onclick="navToLog()">Record a school visit or intervention</button>';
  h += items.join('');
  if (stream.length) {
    var nShow = S._feedStreamN || 6;

    }
  }
  if (!items.length) {
    h += item({ avatar: av('DDD',0,true), name:'Welcome', meta:'Today', body:'Your feed builds as the programme moves. Log your first visit and it will appear here.' });
  }
  h += '</div></div>';
  return h;

function feedDayKey() { var d = new Date(); return d.getFullYear()*1000 + Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000); }
// One spotlight per day, drawn from the official's own patch; deterministic daily rotation.
async function loadFeedSpotlight() {
  try {
    if (S._spotlight && S._spotlight.day === feedDayKey()) return;
    if (S._spotlightLoading) return;
    S._spotlightLoading = true;
    var dist = (S.official && S.official.district || '').trim();
    function base(){ var q = sb.from('school_performance').select('school_name,grade,subject,average,term_label').not('average','is',null); if (dist) q = q.eq('district', dist); return q; }
    var rs = await Promise.allSettled([
      base().gt('average',0).lt('average',50).order('average',{ascending:true}).limit(250),
      base().gte('average',70).lte('average',96).order('average',{ascending:false}).limit(250)
    ]);
    var low  = (rs[0].status==='fulfilled' && rs[0].value && rs[0].value.data) || [];
    var high = (rs[1].status==='fulfilled' && rs[1].value && rs[1].value.data) || [];
    var em = (S.official && S.official.email) || '';
    var seed = feedDayKey(); for (var i=0;i<em.length;i++) seed = (seed*31 + em.charCodeAt(i)) % 1000003;
    S._spotlight = { day: feedDayKey(),
      low:  low.length  ? low[seed % low.length] : null,
      high: high.length ? high[(seed*7+13) % high.length] : null };
    S._spotlightLoading = false;
    if (S.view === 'log' && S.f.formStep === -1 && !S.submitted) render();
  } catch(e) { S._spotlightLoading = false; }
}

async function sendInboxReply(id){

    })}); }catch(e){}

function getNotifications() {
  var notifs = [];
  var myId = S._officialId;
  var myEmail = S.official.email || '';
  var myRole = S.official.role || '';
  var myDistrict = S.official.district || '';
  if (!myId) return notifs;

  // 1. Pending support requests (specifically requested for you)
  var pendResolved = {};
  (S._supResponses || []).forEach(function(r) {
    if (r.scope_type === 'resolution') pendResolved[r.support_need] = true;
    if (r.scope_type === 'reopened') delete pendResolved[r.support_need];
  });

  (S.decisions || []).forEach(function(d) {
    if (d.official_id === myId) return;
    var det = d.details || {};
    var needs = det.support_needed || [];
    var taggedAll = det.tagged_officials || {};
    needs.forEach(function(need) {
      if (pendResolved[need]) return;
      if (!ROLE_SUPPORT_MAP[need]) return;
      var taggedForNeed = taggedAll[need] || [];
      var isUUIDMatch = taggedForNeed.some(function(o) { return o.id === myId; });
      var isRoleMatch = ROLE_SUPPORT_MAP[need].includes(myRole) && (det.district || '') === myDistrict;
      if (!isUUIDMatch && !isRoleMatch) return;
      notifs.push({
        type: isUUIDMatch ? 'pending_request' : 'pending_role',
        title: isUUIDMatch ? (det.official_name || d.made_by || 'An official') + ' requested your support' : 'Support needed in your district',
        desc: need + ' — ' + (det.schools || 'school not specified'),
        time: d.date || d.created_at || '',
        navTo: 'pending',
        key: (det.schools||'')+'::'+(need||''),
        color: isUUIDMatch ? '#E65100' : 'var(--orange)'
      });
    });
  });

  // 2. Re-assignments to you
  (S._supResponses || []).forEach(function(r) {
    if (r.scope_type !== 'reassignment') return;
    var det = r.details || {};
    if (!det.reassigned_to || det.reassigned_to.id !== myId) return;
    notifs.push({
      type: 'reassignment',
      title: (r.official_name || 'An official') + ' re-assigned a request to you',
      desc: (r.support_need || '') + ' — ' + (det.school || ''),
      time: r.created_at || '',
      navTo: 'pending',
      key: (det.school||'')+'::'+(r.support_need||''),
      color: '#546E7A'
    });
  });

  // 3. Responses on support threads you logged
  var myNeeds = {};
  (S.decisions || []).forEach(function(d) {
    if (d.official_id !== myId) return;
    var det = d.details || {};
    (det.support_needed || []).forEach(function(n) { myNeeds[n] = true; });
  });
  (S._supResponses || []).forEach(function(r) {
    if (r.official_id === myId) return;
    if (!myNeeds[r.support_need]) return;
    if (r.scope_type === 'resolution' || r.scope_type === 'pending_response' || r.scope_type === 'reassignment') {
      var label = r.scope_type === 'resolution' ? 'marked as addressed' : r.scope_type === 'reassignment' ? 're-assigned' : 'responded to';
      notifs.push({
        type: 'support_update',
        title: (r.official_name || 'An official') + ' ' + label + ' your support request',
        desc: r.support_need || '',
        time: r.created_at || '',
        navTo: 'support',
        key: r.support_need || '',
        color: 'var(--teal)'
      });
    }
  });

  // 4. Comments on your activity posts
  (S._actResponses || []).forEach(function(r) {
    if (r.official_id === myId) return;
    var myDec = (S.decisions || []).find(function(d) { return d.id === r.decision_id && d.official_id === myId; });
    if (!myDec) return;
    notifs.push({
      type: 'activity_comment',
      title: (r.official_name || 'An official') + ' commented on your activity',
      desc: (r.comment || '').slice(0, 80) + (r.comment && r.comment.length > 80 ? '...' : ''),
      time: r.created_at || '',
      navTo: 'activity',
      key: r.decision_id || '',
      color: 'var(--blue)'
    });
  });

  // Sort newest first
  notifs.sort(function(a, b) { return (b.time || '').localeCompare(a.time || ''); });
  return notifs;
}

function getNotifCount() {
  var lastSeen = S._notifLastSeen || '';
  return getNotifications().filter(function(n) { return n.time && n.time > lastSeen; }).length + inboxUnreadCount();
}

function toggleNotifPane() {
  S._notifOpen = !S._notifOpen;
  if (S._notifOpen) {
    S._notifOpenedAt = Date.now();
    var before = (S._inbox||[]).map(function(m){return m.id;}).join(',');
    loadInbox().then(function(){
      var after = (S._inbox||[]).map(function(m){return m.id;}).join(',');
      if (S._notifOpen && after !== before) renderNotifPaneOnly();   // repaint only if new mail
    });
    setTimeout(function() {
      var now = new Date().toISOString();
      S._notifLastSeen = now;
      try { localStorage.setItem('ddd_notif_last_seen', now); } catch(e) {}
      markInboxRead().then(refreshInboxBadge);   // silent: badge updates, pane does not redraw
    }, 1500);
  }
  paintNotifPane();   // overlay only — no full-app rebuild, so no double draw
}

function closeNotifPane() {
  if (Date.now() - (S._notifOpenedAt||0) < 400) return;   // swallow the ghost tap that lands on the overlay as it appears
  S._notifOpen = false;
  S._inboxView = null;
  paintNotifPane();
}

function renderNotifPane() {
  var me=(S.official&&S.official.email||'').toLowerCase();
  var lastSeen = S._notifLastSeen || '';
  S._inboxReply = S._inboxReply || {};

  var items = [];
  (S._inbox||[]).forEach(function(m){
    var mine=(m.sender_email||'').toLowerCase()===me;
    items.push({
      id:'m-'+m.id, msgId:m.id, msg:m,
      who: mine ? 'You \u2192 '+(m.recipient_email||'') : (m.sender_name||m.sender_email||''),
      subject: m.subject||'', body: m.body||'',
      time: m.created_at,
      unread: !m.read_at && !mine,
      replyable: !mine && (m.kind==='tag'||m.kind==='reply'),   // announcements/system are read-only
      kind: m.kind||'tag',
      color: m.kind==='tag' ? 'var(--orange)' : m.kind==='broadcast' ? 'var(--teal)' : 'var(--green)'
    });
  });
  getNotifications().forEach(function(n, i){
    items.push({
      id:'n-'+i, msgId:null, msg:null,
      who: n.title||'', subject:'', body: n.desc||'',
      time: n.time, unread: n.time && n.time > lastSeen,

    });

  items.sort(function(a,b){ return String(b.time||'').localeCompare(String(a.time||'')); });

  var html = '<div class="notif-overlay" onclick="closeNotifPane()"></div>';

  // ── Detail view (one message, on its own) ──

    if (it) {
      html += '<div class="notif-pane-hdr">';

      html += '<button class="notif-pane-close" onclick="closeNotifPane()" title="Close inbox">\u00d7 Close</button>';
      html += '</div>';
      html += '<div class="notif-list" style="padding:16px 16px 8px">';

      html += '<div style="width:42px;height:42px;border-radius:50%;background:'+it.color+';color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:0 0 42px">'+esc((it.who||'?').trim().charAt(0).toUpperCase())+'</div>';
      html += '<div style="min-width:0"><div style="font-size:16px;font-weight:700;color:var(--navy)">'+esc(it.who)+'</div>';
      html += '<div style="font-size:13px;color:var(--grey)">'+fmtWhen(it.time)+'</div></div></div>';
      if(it.subject) html += '<div style="font-size:16px;font-weight:700;color:var(--navy);line-height:1.4;margin-bottom:8px">'+esc(it.subject)+'</div>';
      if(it.body) html += '<div style="font-size:15px;color:var(--navy);line-height:1.65;white-space:pre-wrap">'+esc(it.body)+'</div>';
      if(!it.replyable) html += '<div style="margin-top:16px;padding:10px 12px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--grey);line-height:1.5">This is an update from the DDD Programme. You do not need to reply.</div>';
      html += '</div>';
      if (it.replyable) {
        html += '<div class="ibx-reply-bar">';
        html += '<input type="text" id="ibx-input-'+it.msgId+'" placeholder="Write a reply\u2026" value="'+esc(S._inboxReply[it.msgId]||'')+'" oninput="setInboxReply(\''+it.msgId+'\',this.value)" style="flex:1;padding:12px 14px;border:1px solid #D5DBD9;border-radius:22px;font-size:15px;font-family:inherit">';
        html += '<button id="ibx-send-'+it.msgId+'" onclick="sendInboxReply(\''+it.msgId+'\')" style="padding:12px 20px;border:none;border-radius:22px;background:var(--teal);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit">Send</button>';
        html += '</div>';
      } else {
        html += '<div class="ibx-reply-bar"><button onclick="closeInboxMessage()" style="width:100%;padding:13px;border:none;border-radius:10px;background:var(--teal);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">Back to inbox</button></div>';
      }
      html += '</div>';
      return html;
    }
    S._inboxView = null;   // stale id, fall through to the list
  }

  // ── List view ──
  html += '<div class="notif-pane-hdr"><div class="notif-pane-title">Inbox</div><button class="notif-pane-close" onclick="closeNotifPane()" title="Close inbox">\u00d7 Close</button></div>';
  html += '<div class="notif-list">';
  if (!items.length) {
    html += '<div class="notif-empty">Your inbox is empty.<br>When colleagues tag you, reply to you, or need your support, their messages will appear here.</div>';
  } else {
    items.forEach(function(it){
      var preview = it.body && it.body.length>80 ? it.body.slice(0,80)+'\u2026' : it.body;
      html += '<div class="notif-item'+(it.unread?' unread':'')+'" onclick="openInboxMessage(\''+it.id+'\')" style="cursor:pointer">';
      html += '<div class="notif-dot" style="background:'+it.color+(it.unread?'':';opacity:.3')+'"></div>';

      if(preview) html += '<div class="notif-desc">'+esc(preview)+'</div>';
      html += '<div class="notif-time">'+fmtWhen(it.time)+'</div>';
      html += '</div>';
      html += '<div style="align-self:center;color:#B9C2BF;font-size:20px;padding-left:4px">\u203a</div>';

  html += '</div>';
  return html;
}

async function submitActResponse(decId){

async function updateActionStatus(actionId, newStatus) {
 try {
   const act = S.actions.find(a => a.id === actionId);
   if (!act) { showToast('Action not found'); return; }
   // Ownership check — only the person who logged it can update
   if (act.official_id && act.official_id !== S._officialId) {
     showToast('Only the official who logged this action can update its status');
     return;
   }
   const { error } = await sb.from('actions').update({ status: newStatus }).eq('id', actionId);
   if (error) throw error;
   act.status = newStatus;
   showToast('Status updated to ' + newStatus);
   render();
 } catch(e) {
   showToast('Error updating status: ' + (e.message || e));
 }
}

function closeOutcomeModal() {
 S.outcomeModal = null;
 render();

async function saveOutcome() {
 const m = S.outcomeModal;
 if (!m) return;
 if (!m.description.trim()) {
   m.error = 'Please describe what happened.';
   render(); return;
 }
 // Ownership check
 const parentAct = S.actions.find(a => a.id === m.actionId);
 if (parentAct && parentAct.official_id && parentAct.official_id !== S._officialId) {
   m.error = 'Only the official who logged this action can record an outcome.';
   render(); return;
 }
 m.saving = true; m.error = ''; render();
 try {
   const outcome = {
     id: 'OUT_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
     official_id: S._officialId,
     action_id: m.actionId,
     description: m.description.trim(),
     metric: m.metric.trim() || null,
     value: m.value.trim() || null,
     evidence: m.evidence.trim() || null,
     date: m.date || today(),
     logged_by: S.official.full_name || 'User'
   };
   const { error } = await sb.from('outcomes').insert(outcome);
   if (error) throw error;
   
   // Also mark action as Completed
   await sb.from('actions').update({ status: 'Completed' }).eq('id', m.actionId);
   const act = S.actions.find(a => a.id === m.actionId);
   if (act) act.status = 'Completed';
   
   S.outcomeModal = null;
   showToast('Outcome of the intervention recorded successfully');
   await loadAll();
 } catch(e) {
   m.saving = false;
   m.error = 'Error saving: ' + (e.message || e);
   render();
 }
}

async function loadAll() {
 try {
 const results = await Promise.allSettled([
 sb.from('decisions').select('*').order('created_at',{ascending:false}),
 sb.from('actions').select('*').order('created_at',{ascending:false}),
 sb.from('outcomes').select('*').order('created_at',{ascending:false}),
 sb.from('interventions').select('*').order('entity_name'),
 sb.rpc('get_programme_stats')
 ]);
 S._lastLoadAll = Date.now();
 const val = function(r) { return r.status==='fulfilled' && r.value && !r.value.error ? r.value.data : null; };
 S.decisions = val(results[0]) || S.decisions || [];
 S.actions = val(results[1]) || S.actions || [];
 S.outcomes = val(results[2]) || S.outcomes || [];
 S.interventions = val(results[3]) || S.interventions || [];
 S._programmeStats = val(results[4]) || S._programmeStats || null;
 S.loading = false; S.error = null;
 await loadSupResponses();
 await loadActResponses();
 loadInbox().then(function(){render();});
 // Saved drafts are surfaced via the Resume card on landing (never auto-restored).
 flushSubmitQueue();
 } catch(e) { S.error = e.message; S.loading = false; }
 render();
}

// Live form progress — weights: required fields count more
function getFormProgress() {
 const f = S.f;
 // Each item: [filled boolean, weight]  — required=3, important=2, optional=1
 const checks = [
   // Step 1: Where & When
   [!!f.province, 3],
   [!!f.district, 3],
   [!!f.schools, 3],
   [!!f.official_email, 3],
   [!!f.official_role && (f.official_role !== 'Other' || !!f.official_role_other.trim()), 3],
   [!!f.official_specialisation && (f.official_specialisation !== 'Other' || !!f.official_specialisation_other.trim()), 3],
   [!!f.official_name, 2],
   [!!f.circuit, 1],
   // Step 2: What Happened
   [!!f.activity_type && (f.activity_type !== 'Other' || !!f.activity_type_other.trim()), 3],
   [!!f.intervention_theme, 2],
   [f.subjects.length > 0, 2],
   [f.grades.length > 0, 2],
   [!!f.description, 1],
   [f.sip_focus_areas.length > 0, 1],
   // Step 3: Data Connection
   [!!f.ddd_used, 3],
   [f.action_types.length > 0 && (!f.action_types.includes('Other') || !!f.action_other.trim()), 3],
   [f.decision_types.length > 0, 2],
   [f.intervention_triggers.length > 0 || !!f.intervention_trigger, 1],
   // Step 4: Context & Follow-up
   [f.support_needed.length > 0, 1],
   [!!f.support_level, 1],
   [f.ctx_staffing.length > 0, 1],
   [f.ctx_resources.length > 0, 1],
   [f.ctx_learners.length > 0, 1],
   [!!f.educators_supported, 2],
   [!!f.doc_file || !!f.doc_url, 1],
 ];
 // DDD-specific fields only count when DDD was actually used
 const usedDDD = f.ddd_used && f.ddd_used !== 'no' && f.ddd_used !== 'other-data';
 if (usedDDD) {
   checks.push([f.ddd_reports.length > 0, 2]);
   checks.push([!!f.insight_type, 2]);
   checks.push([!!f.insight_detail, 1]);
 }
 if (f.ddd_used === 'other-data') {
   checks.push([!!(f.other_data_source && f.other_data_source.trim()), 2]);
 }
 let filled = 0, total = 0;
 for (const [done, w] of checks) { total += w; if (done) filled += w; }
 return Math.round((filled / total) * 100);
}

function getProgressHint(pct) {
 if (pct === 100) return 'All done — ready to submit!';
 if (pct >= 80) return 'Almost there — just a few more details';
 if (pct >= 50) return 'Good progress — keep going';
 if (pct >= 25) return 'Off to a good start';
 return 'Fill in the fields as you go — your progress is saved';
}

function renderLiveProgress() {
 const pct = getFormProgress();
 const color = pct === 100 ? 'var(--green)' : pct >= 60 ? 'var(--teal)' : pct >= 30 ? 'var(--orange)' : '#c8c6c4';
 return `<div class="form-live-progress">
   <div class="form-live-progress-top">
     <span class="form-live-progress-label">Form progress</span>
     <span class="form-live-progress-pct ${pct===100?'complete':''}">${pct}%</span>
   </div>
   <div class="form-live-bar"><div class="form-live-bar-fill" style="width:${pct}%;background:${color}"></div></div>
   <div class="form-live-progress-hint">${getProgressHint(pct)}</div>
 </div>`;
}

function renderForm() {

async function checkBiometricState() {
  var st = S._bio || (S._bio = { checked:false, checking:true, supported:null, count:0, busy:false });
  try {
    var hasApi = !!(sb && sb.auth && typeof sb.auth.registerPasskey === 'function' && sb.auth.passkey);
    var hasWebauthn = (typeof window.PublicKeyCredential !== 'undefined');
    var platform = false;
    if (hasApi && hasWebauthn && PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) {
      try { platform = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); } catch (e) { platform = false; }
    }
    st.supported = !!(hasApi && hasWebauthn && platform);
    st.count = 0;
    if (st.supported) {
      try { var res = await sb.auth.passkey.list(); st.count = (res && res.data && res.data.length) ? res.data.length : 0; } catch (e) { st.count = 0; }
    }
  } catch (e) { st.supported = false; }
  st.checked = true; st.checking = false; render();
}

async function enrolBiometric() {
  var st = S._bio; if (!st) return;
  st.busy = true; render();
  try {
    var out = await sb.auth.registerPasskey();
    if (out && out.error) {
      var m = (out.error.message || '').toLowerCase();
      if (m.indexOf('not allowed') >= 0 || m.indexOf('cancel') >= 0 || m.indexOf('abort') >= 0) { /* user cancelled — quiet */ }
      else if (m.indexOf('confirm') >= 0) { showToast('Your account email is not confirmed yet'); haptic(HAPTIC_ERR); }
      else { showToast('Could not set up biometric sign-in'); haptic(HAPTIC_ERR); }
    } else {
      try{localStorage.setItem('ddd_bio_enrolled','1')}catch(e){} showToast('Biometric sign-in is set up'); haptic(HAPTIC_OK);
    }
  } catch (e) {
    var em = ((e && (e.name || e.message)) || '').toString().toLowerCase();
    if (em.indexOf('notallowed') >= 0 || em.indexOf('abort') >= 0) { /* cancelled — quiet */ }
    else { showToast('Could not set up biometric sign-in'); haptic(HAPTIC_ERR); }
  }
  st.busy = false; st.checked = false; st.checking = false; render();
}

function urlB64ToUint8Array(base64String) {
  var padding = '='.repeat((4 - base64String.length % 4) % 4);
  var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  var raw = atob(base64);
  var arr = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

async function checkPushState() {
  var st = S._push || (S._push = { checked:false, checking:true, supported:null, on:false, busy:false });
  try {
    var supported = ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window);

      try { var reg = await navigator.serviceWorker.ready; var sub = await reg.pushManager.getSubscription(); st.on = !!sub; }
      catch (e) { st.on = false; }

  var st = S._push; if (!st) return;

    if (!(('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window))) {

    }

    if (perm !== 'granted') { st.busy = false; showToast('Notifications were not allowed'); render(); return; }
    var reg = await navigator.serviceWorker.ready;

function getLookbackTerms(currentTerm) {
  var parts = currentTerm.split(' ');
  var termNum = parseInt(parts[1]) || 1;
  var year = parseInt(parts[2]) || 2026;
  var terms = [currentTerm];
  for (var i = 0; i < 3; i++) {
    termNum = termNum - 1;
    if (termNum < 1) { termNum = 4; year = year - 1; }
    terms.push('Term ' + termNum + ' ' + year);
  }
  return terms;
}
function getSchoolVisitHistory(schoolNames) {
  var lookbackTerms = getLookbackTerms(S.f.term);
  var results = [];
  for (var si = 0; si < schoolNames.length; si++) {
    var school = schoolNames[si];
    var byYou = 0;
    var byColleagues = 0;
    for (var di = 0; di < S.decisions.length; di++) {
      var dec = S.decisions[di];
      if (!dec.details || !dec.details.term) continue;
      if (lookbackTerms.indexOf(dec.details.term) === -1) continue;
      var decSchools = (dec.details.schools || '').split(',');
      var match = false;
      for (var k = 0; k < decSchools.length; k++) {
        if (decSchools[k].trim() === school) { match = true; break; }
      }
      if (!match) continue;
      if (dec.official_id && dec.official_id === S._officialId) { byYou++; }
      else { byColleagues++; }
    }
    results.push({ school: school, byYou: byYou, byColleagues: byColleagues, total: byYou + byColleagues });
  }
  return results;
}
function renderVisitHistoryCard() {
  var schools = parseSchoolsArr();
  if (schools.length === 0) return '';
  var history = getSchoolVisitHistory(schools);
  var lookback = getLookbackTerms(S.f.term);
  var oldest = lookback[lookback.length - 1].split(' ');
  var newest = lookback[0].split(' ');
  var termLabel = 'T' + oldest[1] + ' ' + oldest[2] + ' \u2013 T' + newest[1] + ' ' + newest[2];

  // Compute summary stats
  var totalVisited = 0, totalNever = 0, grandTotal = 0, grandByYou = 0;
  for (var j = 0; j < history.length; j++) {
    if (history[j].total > 0) totalVisited++;
    else totalNever++;
    grandTotal += history[j].total;
    grandByYou += history[j].byYou;
  }

  var COLLAPSE_THRESHOLD = 6;
  var manySchools = schools.length > COLLAPSE_THRESHOLD;
  var isCollapsed = manySchools && !S.f._vhExpanded;

  var summaryBar = '';
  if (manySchools) {
    summaryBar = '<div class="vh-summary">'
      + '<span><strong>' + schools.length + '</strong><em>Schools</em></span>'
      + '<span><strong>' + totalVisited + '</strong><em>With visits</em></span>'
      + '<span><strong>' + totalNever + '</strong><em>Not visited</em></span>'
      + '<span><strong>' + grandTotal + '</strong><em>Total visits</em></span>'
      + (grandByYou > 0 ? '<span><strong>' + grandByYou + '</strong><em>By you</em></span>' : '')
      + '</div>';
  }

  var rows = '';
  for (var i = 0; i < history.length; i++) {
    var h = history[i];
    var countText = '';
    if (h.total === 0) {
      countText = '<span class="vh-zero">No prior visits logged</span>';
    } else {
      var parts = [];
      if (h.byYou > 0) parts.push(h.byYou + ' by you');
      if (h.byColleagues > 0) parts.push(h.byColleagues + ' by colleague' + (h.byColleagues !== 1 ? 's' : ''));
      countText = h.total + ' visit' + (h.total !== 1 ? 's' : '') + ' <span style="color:var(--grey);font-size:12px">(' + parts.join(', ') + ')</span>';
    }
    rows += '<div class="vh-row"><span class="vh-school">' + esc(h.school) + '</span><span class="vh-count">' + countText + '</span></div>';
  }

  var toggleBtn = '';
  if (manySchools) {
    toggleBtn = '<button class="vh-toggle" onclick="S.f._vhExpanded=!' + (S.f._vhExpanded ? 'true' : 'false') + ';render()">'
      + (isCollapsed ? '&#9660; Show all ' + schools.length + ' schools' : '&#9650; Collapse school list')
      + '</button>';
  }

  return '<div class="visit-history-card">'
    + '<div class="vh-title">&#128203; Recent support at selected schools (' + termLabel + ')</div>'
    + summaryBar
    + '<div class="vh-rows' + (isCollapsed ? ' vh-collapsed' : '') + '">' + rows + '</div>'
    + toggleBtn
    + '</div>';
}

function getAvailableSchools(){
  const d=S.f.district,c=S.f.circuit;
  if(!d||!SCHOOLS_MAP[d])return[];
  if(c&&SCHOOLS_MAP[d][c])return SCHOOLS_MAP[d][c];
  const all=[];const seen=new Set();
  for(const cc of Object.keys(SCHOOLS_MAP[d])){for(const pair of SCHOOLS_MAP[d][cc]){if(!seen.has(pair[0])){seen.add(pair[0]);all.push(pair);}}}
  all.sort((a,b)=>a[0].localeCompare(b[0]));return all;
}

function getPhaseForGrades(){
  const g=S.f.grades;if(!g.length)return null;
  const nums=g.map(x=>x==='R'?0:parseInt(x));const max=Math.max(...nums);
  if(max<=3)return'Foundation';if(max<=6)return'Intermediate';if(max<=9)return'Senior';return'FET';
}
function thresholdLabel(v){
  const m={'below-30':'below 30%','at-30-39':'at 30-39% (close to passing)','at-40-49':'at 40-49% (just above pass)','missed-one-criteria':'missing one thing for promotion','missed-multiple':'missing several things for promotion','sba-exam-gap':'with a big gap between SBA and exam marks','high-absence':'absent 10+ days','progressed':'progressed learners needing support'};
  return m[v]||'';
}
function buildInsightStatement(){
  const f=S.f;
  const school=f.schools||'the selected school(s)';
  const parts=[];
  const types=f.insight_types&&f.insight_types.length?f.insight_types:(f.insight_type?[f.insight_type]:[]);
  
  types.forEach(function(t){
  if(t==='subject-performance'){
    if(f.insight_pass_rate&&f.insight_learners_affected)parts.push('You found a '+f.insight_pass_rate+'% pass rate affecting '+f.insight_learners_affected+' learners at '+esc(school)+'.');
    else if(f.insight_pass_rate)parts.push('You found a '+f.insight_pass_rate+'% pass rate at '+esc(school)+'.');
    else if(f.insight_learners_affected)parts.push('You identified '+f.insight_learners_affected+' learners needing attention at '+esc(school)+'.');
    if(f.insight_threshold)parts.push('These learners were '+thresholdLabel(f.insight_threshold)+'.');
  }else if(t==='learner-attendance'){
    if(f.insight_learners_affected&&f.insight_attendance_days)parts.push(f.insight_learners_affected+' learners at '+esc(school)+' were absent '+f.insight_attendance_days+'+ days.');
    else if(f.insight_learners_affected)parts.push(f.insight_learners_affected+' learners at '+esc(school)+' had attendance issues.');
  }else if(t==='educator-attendance'){
    if(f.insight_educator_absent&&f.insight_attendance_days)parts.push(f.insight_educator_absent+' educator'+(parseInt(f.insight_educator_absent)>1?'s':'')+' at '+esc(school)+' absent '+f.insight_attendance_days+'+ days.');
    else if(f.insight_educator_absent)parts.push(f.insight_educator_absent+' educator'+(parseInt(f.insight_educator_absent)>1?'s':'')+' at '+esc(school)+' had attendance issues.');
  }else if(t==='sba-exam-gap'){
    if(f.insight_sba_exam_gap)parts.push('SBA-Exam gap of '+f.insight_sba_exam_gap+'% found at '+esc(school)+'.');
    if(f.insight_learners_affected)parts.push(f.insight_learners_affected+' learners affected.');
  }else if(t==='curriculum-coverage'){
    if(f.insight_curriculum_pct)parts.push('Only '+f.insight_curriculum_pct+'% of curriculum covered at '+esc(school)+'.');
    if(f.insight_learners_affected)parts.push(f.insight_learners_affected+' learners affected.');
  }else if(t==='promotion-criteria'){
    if(f.insight_learners_affected&&f.insight_threshold)parts.push(f.insight_learners_affected+' learners at '+esc(school)+' were '+thresholdLabel(f.insight_threshold)+'.');
    else if(f.insight_learners_affected)parts.push(f.insight_learners_affected+' learners at risk at '+esc(school)+'.');
    if(f.insight_pass_rate)parts.push('Pass rate was '+f.insight_pass_rate+'%.');
  }else if(t==='other-issue'){
    if(f.insight_detail)parts.push(f.insight_detail);
  }
  });
  if(!types.length){
    if(f.insight_pass_rate)parts.push('Pass rate: '+f.insight_pass_rate+'%.');
    if(f.insight_learners_affected)parts.push(f.insight_learners_affected+' learners affected.');
    if(f.insight_threshold)parts.push('Learners were '+thresholdLabel(f.insight_threshold)+'.');
  }
  if(f.insight_detail&&!types.includes('other-issue'))parts.push(f.insight_detail);
  return parts.join(' ');
}

_time==='fully'?'var(--teal-dk)':'var(--navy)'}">In place</button><button type="button" onclick="S.f.obs_time=S.f.obs_time==='partial'?'':'partial';render()" style="flex:1;min-height:44px;padding:10px 6px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid ${S.f.obs_time==='partial'?'var(--teal)':'#d8dde3'};background:${S.f.obs_time==='partial'?'var(--teal-lt)':'#fff'};color:${S.f.obs_time==='partial'?'var(--teal-dk)':'var(--navy)'}">Partly</button><button type="button" onclick="S.f.obs_time=S.f.obs_time==='none'?'':'none';render()" style="flex:1;min-height:44px;padding:10px 6px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid ${S.f.obs_time==='none'?'var(--teal)':'#d8dde3'};background:${S.f.obs_time==='none'?'var(--teal-lt)':'#fff'};color:${S.f.obs_time==='none'?'var(--teal-dk)':'var(--navy)'}">Not yet</button></div></div></div>

async function uploadSupportingDoc(file, actionId) {
 if (!file) return { url: null, name: null };
 const ext = file.name.split('.').pop().toLowerCase();
 const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_').slice(0, 80);
 const path = '%s/%s/%s'.replace('%s', S._officialId || 'unknown').replace('%s', actionId).replace('%s', Date.now() + '_' + safe);
 const { data, error } = await sb.storage.from('Supporting-Documents').upload(path, file, {
   cacheControl: '3600',
   upsert: false,
   contentType: file.type || 'application/octet-stream'
 });
 if (error) throw new Error('File upload failed: ' + error.message);
 const { data: urlData } = sb.storage.from('Supporting-Documents').getPublicUrl(path);
 return { url: urlData?.publicUrl || null, name: file.name };
}

function togArr(arr, val, add) {
 const i = arr.indexOf(val);

// Context toggles with mutual exclusivity
const CTX_EXCLUSIVE = {
 staffing: [['All posts filled','Vacant post(s)']],
 resources: [['Adequate','Textbook shortage','No devices/connectivity','Infrastructure issues','LTSM not delivered']],
 learners: [['No major concerns','High absenteeism','Welfare concerns','Overcrowded classrooms','Language barriers','Progressed learners present','Learning difficulties / barriers']]
};
function togCtx(arr, val, add, group) {
 if (add) {
   const rules = CTX_EXCLUSIVE[group] || [];
   if (group === 'staffing') {
     // "All posts filled" and "Vacant post(s)" are mutually exclusive
     if (val === 'All posts filled') { const vi = arr.indexOf('Vacant post(s)'); if(vi!==-1) arr.splice(vi,1); }
     if (val === 'Vacant post(s)') { const vi = arr.indexOf('All posts filled'); if(vi!==-1) arr.splice(vi,1); }
   }
   if (group === 'resources') {
     // "Adequate" excludes all others; any other excludes "Adequate"
     if (val === 'Adequate') { arr.length = 0; }
     else { const vi = arr.indexOf('Adequate'); if(vi!==-1) arr.splice(vi,1); }
   }
   if (group === 'learners') {
     // "No major concerns" excludes all others; any other excludes "No major concerns"
     if (val === 'No major concerns') { arr.length = 0; }
     else { const vi = arr.indexOf('No major concerns'); if(vi!==-1) arr.splice(vi,1); }
   }
   if (group === 'support') {
     // "On track" excludes all others; any other excludes "On track"
     if (val.startsWith('On track')) { arr.length = 0; }
     else { for(let k=arr.length-1;k>=0;k--){if(arr[k].startsWith('On track'))arr.splice(k,1);} }
   }
   if (!arr.includes(val)) arr.push(val);
 } else {
   const i = arr.indexOf(val);
   if (i!==-1) arr.splice(i,1);
 }
 render();
}

 if (!f.official_specialisation) errs.push({step:0,field:'official_specialisation',label:'Specialisation',fieldId:'fld-spec'});

 // Step 2: What Happened
 if (!f.activity_type) errs.push({step:1,field:'activity_type',label:'Activity type',fieldId:'fld-activity'});
 if (f.activity_type==='Other'&&!f.activity_type_other.trim()) errs.push({step:1,field:'activity_type_other',label:'Activity type (please describe)',fieldId:'fld-activity'});
 if (!f.grades.length) errs.push({step:1,field:'grades',label:'Grades supported',fieldId:'fld-grades'});

 if (!f.ddd_used) errs.push({step:2,field:'ddd_used',label:'Was data used?',fieldId:'fld-ddd-used'});

// Friendly relative timestamp: "just now", "2 hours ago", "yesterday", "3 days ago", "12 Apr"
function _relativeTime(iso) {
  try {
    const then = new Date(iso).getTime();
    const diffMs = Date.now() - then;
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + ' minute' + (mins===1?'':'s') + ' ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + ' hour' + (hrs===1?'':'s') + ' ago';
    const days = Math.floor(hrs / 24);
    if (days === 1) return 'yesterday';
    if (days < 7) return days + ' days ago';
    return new Date(iso).toLocaleDateString('en-ZA', { day:'numeric', month:'short' });
  } catch(e) { return ''; }
}

// Extract year + term number from a decision. Uses det.term ("Term N YYYY")
// when present, else derives from d.date. Returns {year:Number, termNum:Number}
// or null if neither is parseable.
function _decisionYearTerm(d) {
  const det = d.details || {};
  if (det.term) {
    const m = /^Term\s+(\d)\s+(\d{4})$/.exec(det.term);
    if (m) return { year: parseInt(m[2], 10), termNum: parseInt(m[1], 10) };
  }
  if (d.date) {
    const t = deriveTermFromDate(d.date);
    const m2 = /^Term\s+(\d)\s+(\d{4})$/.exec(t);
    if (m2) return { year: parseInt(m2[2], 10), termNum: parseInt(m2[1], 10) };
  }
  return null;
}

// Years to offer in the Year dropdown: every year present in the loaded
// decisions, plus the current calendar year (so the user can select it even
// before any data exists for it). Sorted descending (most recent first).
function getDashYears() {
  const years = new Set();
  years.add(new Date().getFullYear());
  (S.decisions || []).forEach(function(d) {
    const yt = _decisionYearTerm(d);
    if (yt) years.add(yt.year);
  });
  return [...years].sort(function(a, b) { return b - a; });
}

function getClientScope() {
  const role = S.official.role || '';
  const prov = S.official.province || '';

  // National scope: explicit national province or national-level roles
  if (prov === 'National' || prov === 'All' || ['Director General','Deputy Minister','Member','Interventions & Monitoring Manager'].includes(role)) return 'national';

  // Provincial scope
  if (['Provincial Manager','Chief Education Specialist','Deputy Chief Education Specialist','Deputy Director General','Director','Chief Director','Gauteng Provincial Project Manager','North West Junior PM'].includes(role) || role.includes('Provincial')) return 'province';

  // District scope
  if (['Circuit Manager','Subject Advisor','Cluster Lead','District Director','Senior Education Specialist'].includes(role)) return 'district';

  // Default: district-level scope so filters remain usable
  return 'district';
}

function applyDashFilters(decs) {
  const f = S.dashFilter;
  const tf = S.dashTermFilter || { year: new Date().getFullYear(), term: 'All' };
  return decs.filter(d => {
    const det = d.details || {};
    if (f.province !== 'All' && (det.province || '') !== f.province) return false;
    if (f.district !== 'All' && (det.district || '') !== f.district) return false;
    if (f.circuit !== 'All' && (det.circuit || '') !== f.circuit) return false;
    if (f.school !== 'All') {
      const schools = (det.schools || '').split(',').map(s => s.trim());
      if (!schools.includes(f.school)) return false;
    }
    // Term/Year filter — uses det.term when present, falls back to deriving
    // from d.date so older rows missing det.term aren't silently dropped.
    const yt = _decisionYearTerm(d);
    if (!yt) {
      // Genuinely no term and no date — only allow it through when no time
      // filter is set at all. With a year selected we exclude these rows
      // because we cannot place them in time.
      if (tf.year || (tf.term && tf.term !== 'All')) return false;
    } else {
      if (tf.year && yt.year !== tf.year) return false;
      if (tf.term && tf.term !== 'All' && yt.termNum !== tf.term) return false;
    }
    return true;
  });
}

// ── EXPORT ALL DATA AS CSV ──
function exportAllDataCSV() {
 const exportAllowed = (S.official?.email || '').toLowerCase() === 'victor@newleaders.co.za';
 if (!exportAllowed) { showToast('Export is restricted to programme administrators'); return; }

 const decs = S.decisions || [];
 const acts = S.actions || [];
 const outs = S.outcomes || [];

 if (decs.length === 0) { showToast('No real data to export yet — only demo data is loaded'); return; }

 // Build flat rows: one row per decision+action+outcome combination
 const rows = [];
 decs.forEach(d => {
   const det = d.details || {};
   const relActs = acts.filter(a => a.decision_id === d.id);
   if (relActs.length === 0) {
     // Decision with no action yet
     rows.push(buildExportRow(d, det, null, null));
   } else {
     relActs.forEach(a => {
       const relOuts = outs.filter(o => o.action_id === a.id);
       if (relOuts.length === 0) {
         rows.push(buildExportRow(d, det, a, null));
       } else {
         relOuts.forEach(o => rows.push(buildExportRow(d, det, a, o)));
       }
     });
   }
 });

 const headers = [
   'Date','Logged By','Province','District','Circuit','Schools',
   'Term','Activity Type','Intervention Theme','Subjects','Grades',
   'Description','DDD Used','DDD Reports','DDD Access Date','DDD Dashboard Confirmed',
   'Insight','Decision Type','Educators Supported',
   'Insight Type','Insight Pass Rate','Insight Learners Affected','Insight Educator Absent','Insight Attendance Days','Insight SBA-Exam Gap','Insight Curriculum Pct','Intervention Trigger',
   'Barriers (Staffing)','Barriers (Resources)','Barriers (Learners)','Context Notes',
   'Obs: APIP Current','Obs: APIP Implemented','Obs: Lesson Plans','Obs: DH Monitoring','Obs: Learner Activities','Obs: Marking Done','Obs: Time Registers','Obs: Learner Attendance','Obs: Educator Attendance','Obs: Departures Controlled',
   'Follow-Up','Follow-Up Description','Performance Focus Areas','Support Needed','Support Level',
   'Action Taken','Action Responsible','Action Status','Action Notes',
   'Supporting Doc','Supporting Doc URL','Additional Data Sources','Additional Supporting Docs','Outcome Metric','Outcome Value','Outcome Description',
   'Decision ID','Action ID'
 ];

 const csvContent = [headers, ...rows].map(row =>
   row.map(cell => {
     const s = String(cell == null ? '' : cell).replace(/"/g, '""');
     return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s + '"' : s;
   }).join(',')
 ).join('\n');

 const BOM = '\uFEFF';
 const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 const dateStr = new Date().toISOString().slice(0,10);
 a.href = url;
 a.download = 'DDD_Interventions_Export_' + dateStr + '.csv';
 document.body.appendChild(a);
 a.click();
 document.body.removeChild(a);
 URL.revokeObjectURL(url);
 showToast('Export downloaded — open in Excel');
}

function buildExportRow(d, det, a, o) {
 const arrJoin = v => Array.isArray(v) ? v.join('; ') : (v || '');

     function _renderPendCard(it) {

             html += '<div style="font-size:13px;color:var(--navy);line-height:1.5">'+esc(c.det.follow_up_desc)+'</div>';

               html += '<div style="font-size:11.5px;color:var(--green-text);font-weight:600;margin-top:6px">Completed'+(c.det.follow_up_completed_date?' on '+c.det.follow_up_completed_date:'')+'</div>';

             }
             html += '</div>';

             }
             evFiles.forEach(function(ef) {
               var efName = (ef.name||'File').length > 30 ? (ef.name||'File').slice(0,27)+'...' : (ef.name||'File');
               html += '<a href="'+esc(ef.url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#f0f7f7;border:1px solid var(--teal-md);border-radius:6px;font-size:12px;color:var(--teal);font-weight:600;text-decoration:none">\uD83D\uDCCE '+esc(efName)+'</a>';
             });
             html += '</div>';
           }
           html += '</div>';
         }

         // ── COMMENTS (always visible — Facebook-style) ──
         html += '<div class="act-post-comments">';
           var showAll = S._actThreadOpen && S._actThreadOpen[cardId];
           var visibleComments = showAll ? decResponses : decResponses.slice(-2);
           var hiddenCount = decResponses.length - visibleComments.length;

           html += '<div style="margin-top:8px;border-top:1px solid #f0f0f0;padding-top:8px">';
           if (decResponses.length > 0) {
             html += '<div style="font-size:11.5px;color:var(--grey);margin-bottom:6px">' + decResponses.length + ' comment' + (decResponses.length!==1?'s':'') + '</div>';
           }
           if (hiddenCount > 0) {
             html += '<div onclick="S._actThreadOpen[\''+cardId+'\']=true;render()" style="font-size:12px;color:var(--teal);font-weight:600;cursor:pointer;padding:6px 0;text-align:center">View ' + hiddenCount + ' earlier comment' + (hiddenCount!==1?'s':'') + '</div>';
           }
           if (visibleComments.length) {
             visibleComments.forEach(function(r){
               var rInit = (r.official_name||'?').split(' ').map(function(w){return w[0]||''}).join('').slice(0,2).toUpperCase();
               html += '<div class="pt-comment"><div class="pt-avatar" style="background:var(--teal-dk)">'+rInit+'</div><div class="pt-bubble"><div class="pt-bubble-hdr"><span class="pt-name">'+esc(r.official_name||'')+'</span><span class="pt-time">'+supTimeAgo(r.created_at)+'</span></div><div class="pt-text">'+renderCommentBody(r.comment||'')+'</div>'+(r.official_role?'<div class="pt-role">'+esc(r.official_role)+'</div>':'')+'</div></div>';
             });
           }

           // Reply input always visible
           html += '<div class="pt-reply"><textarea class="pt-input" id="act-reply-'+decIdEsc.replace(/'/g,'')+'" placeholder="Write a comment\u2026 to notify someone, type @ and their name or email address" rows="1" oninput="this.style.height=\'auto\';this.style.height=Math.min(this.scrollHeight,100)+\'px\';setActReply(\''+decIdEsc+'\',this.value);handleMentionInput(\''+decIdEsc+'\',this.value,this)">'+esc(S._actReplyText[c.dec.id]||'')+'</textarea><div class="pt-actions"><span class="attach-hint">Tap the clip icon to attach supporting evidence →</span><button class="reply-attach" onclick="event.stopPropagation();triggerCommentAttach(\''+decIdEsc+'\')" title="Attach supporting evidence">\uD83D\uDCCE</button><button class="pt-send" onclick="submitActResponse(\''+decIdEsc+'\')">Send</button></div></div>';
           html += renderAttachButton(c.dec.id);
           html += renderMentionDropdown(c.dec.id);
           html += '</div>';

           if (isMine && c.act && c.status !== 'Completed') {
             html += '<div class="acd-owner-btns">';
             if (c.status === 'Planned') html += '<button class="poa-btn poa-start" onclick="updateActionStatus(\''+c.act.id+'\',\'In Progress\')">Start</button>';
             html += '<button class="poa-btn poa-done" onclick="updateActionStatus(\''+c.act.id+'\',\'Completed\')">Mark Complete</button></div>';
           } else if (isCompleted) {
             html += '<div style="font-size:11.5px;color:var(--grey-lt);font-style:italic;margin-top:8px">Completed'+(c.act&&c.act.updated_at?' on '+fmtDate(c.act.updated_at):'')+'</div>';
           }

           html += '</div>';

         html += '</div>';
       });
       return html;
     })()}
   </div>
 </div>
`:''}\

async function markFollowUpDone(decId) {
  var dec = S.decisions.find(function(d){ return d.id === decId; });
  if (!dec) { showToast('Could not find this activity'); return; }
  // Ownership check
  if (dec.official_id && dec.official_id !== S._officialId) {
    showToast('Only the official who logged this activity can mark it as done');
    return;
  }
  var det = dec.details || {};
  det.follow_up_completed = true;
  det.follow_up_completed_date = new Date().toISOString().slice(0,10);
  det.follow_up_completed_by = S.official.full_name || 'Unknown';
  var r = await sb.from('decisions').update({ details: det }).eq('id', decId);
  if (r.error) { showToast('Could not update — check your connection and try again'); return; }
  dec.details = det;
  showToast('Follow-up marked as done');
  render();
}

function logFollowUpVisit(decId) {
  var dec = S.decisions.find(function(d){ return d.id === decId; });
  if (!dec) { showToast('Could not find this activity'); return; }
  var det = dec.details || {};
  S.view = 'log';
  S.submitted = false;
  S.f.formStep = 0;
  S.f.province = det.province || '';
  S.f.district = det.district || '';
  S.f.circuit = det.circuit || '';
  S.f.schools = det.schools || '';
  S.f.activity_type = 'Monitoring / follow-up visit';
  S.f.intervention_theme = det.intervention_theme || '';
  S.f.subjects = Array.isArray(det.subjects) ? det.subjects.slice() : [];
  S.f.grades = Array.isArray(det.grades) ? det.grades.slice() : [];
  S.f.description = 'Follow-up visit for: ' + (det.follow_up_desc || det.description || '');
  showToast('Form pre-filled from original activity — review and complete');
  render();
  (S._suppressScrollRestore=true,window.scrollTo({top:0,behavior:'smooth'}));
}
