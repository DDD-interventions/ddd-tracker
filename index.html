<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Decisions to Action — Layout Prototypes</title>
<style>
:root{--navy:#1B2A4A;--teal:#0D7377;--teal-dk:#095456;--blue:#1565C0;--green:#2E7D32;--green-lt:#E8F5E9;--green-dk:#1B5E20;--orange:#E8952E;--red:#E53935;--grey:#8D8D8D;--grey-dk:#605E5C;--off:#F5F6F8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F0F2F5;color:var(--navy)}

.tabs{display:flex;background:#fff;border-bottom:2px solid #E0E0E0;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:12px 6px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border-bottom:3px solid transparent;color:var(--grey);transition:.2s}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}

.view{display:none;padding:12px;max-width:480px;margin:0 auto}
.view.active{display:block}

.label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);margin-bottom:12px;padding:0 4px}

/* ═══ OPTION A: Card per district ═══ */
.a-card{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;border:1px solid #E8EBF0}
.a-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .15s}
.a-hdr:active{background:#F0F8F8}
.a-prov{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--grey);line-height:1}
.a-name{font-size:13px;font-weight:700;color:var(--navy);margin-top:2px}
.a-meta{display:flex;gap:6px;flex-shrink:0;align-items:center}
.a-schools{font-size:10px;color:var(--grey);font-weight:500}
.a-chevron{font-size:10px;color:var(--grey);transition:transform .2s}
.a-chevron.open{transform:rotate(90deg)}
.a-bar-wrap{padding:0 14px 10px}
.a-bar{height:10px;background:#ECEFF1;border-radius:5px;overflow:hidden;display:flex}
.a-bar-seg{height:100%;transition:width .4s}
.a-legend{display:flex;gap:10px;padding:2px 14px 10px;font-size:10px;color:var(--grey-dk)}
.a-legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.a-legend strong{color:var(--navy)}
.a-detail{border-top:1px solid #E8EBF0;background:#FAFBFC}
.a-chain{padding:10px 14px;border-bottom:1px solid #F0F2F5}
.a-chain:last-child{border-bottom:none}
.a-chain-school{font-size:10px;font-weight:600;color:var(--grey-dk);margin-bottom:4px}
.a-chain-dec{font-size:11px;font-weight:600;color:var(--teal);line-height:1.4}
.a-chain-act{font-size:11px;color:var(--navy);margin-top:2px;line-height:1.4}
.a-chain-foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.a-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap}
.a-badge.ip{background:#FFF3E0;color:var(--orange)}.a-badge.c{background:var(--green-lt);color:var(--green-dk)}.a-badge.p{background:#E3F2FD;color:var(--blue)}
.a-date{font-size:9px;color:var(--grey)}

/* ═══ OPTION B: Compact list with inline bars ═══ */
.b-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;margin-bottom:4px;border-radius:8px;border:1px solid #E8EBF0;cursor:pointer;transition:background .15s}
.b-row:active{background:#F0F8F8}
.b-entity{flex:1;min-width:0}
.b-prov{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--grey);line-height:1}
.b-name{font-size:12px;font-weight:700;color:var(--navy);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.b-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;width:120px}
.b-bar{height:8px;background:#ECEFF1;border-radius:4px;overflow:hidden;display:flex;width:100%}
.b-bar-seg{height:100%}
.b-counts{display:flex;gap:6px;font-size:9px;font-weight:700}
.b-cnt{display:flex;align-items:center;gap:2px}
.b-cnt .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.b-cnt.ip{color:var(--orange)}.b-cnt.ip .dot{background:var(--orange)}
.b-cnt.c{color:var(--green)}.b-cnt.c .dot{background:var(--green)}
.b-cnt.pl{color:var(--blue)}.b-cnt.pl .dot{background:var(--blue)}
.b-detail{background:#FAFBFC;border:1px solid #E8EBF0;border-top:none;border-radius:0 0 8px 8px;margin-top:-4px;margin-bottom:4px;padding:6px 0}
.b-chain{padding:8px 12px;border-bottom:1px solid #F0F2F5;font-size:11px}
.b-chain:last-child{border-bottom:none}

/* ═══ OPTION C: Summary + expandable list ═══ */
.c-summary{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #E8EBF0}
.c-stats{display:flex;gap:8px;margin-bottom:12px}
.c-stat{flex:1;text-align:center;padding:8px 4px;background:var(--off);border-radius:8px}
.c-stat-num{font-size:20px;font-weight:800;color:var(--navy)}
.c-stat-label{font-size:9px;font-weight:600;color:var(--grey);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.c-stat.highlight-ip .c-stat-num{color:var(--orange)}
.c-stat.highlight-c .c-stat-num{color:var(--green)}
.c-bar-full{height:10px;background:#ECEFF1;border-radius:5px;overflow:hidden;display:flex}
.c-bar-seg{height:100%}
.c-districts{margin-top:8px}
.c-dist{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #F0F2F5;cursor:pointer}
.c-dist:last-child{border-bottom:none}
.c-dist:active{background:#F8FAFA;border-radius:6px}
.c-dist-info{flex:1;min-width:0}
.c-dist-name{font-size:12px;font-weight:700;color:var(--navy)}
.c-dist-sub{font-size:10px;color:var(--grey);margin-top:1px}
.c-dist-bar{width:80px;flex-shrink:0}
.c-dist-bar-inner{height:6px;background:#ECEFF1;border-radius:3px;overflow:hidden;display:flex}
.c-dist-bar-seg{height:100%}
.c-dist-chevron{font-size:10px;color:var(--grey);flex-shrink:0;transition:transform .2s}
.c-dist-chevron.open{transform:rotate(90deg)}
.c-detail{padding:6px 0 6px 20px}
.c-chain-item{padding:8px 0;border-bottom:1px solid #F5F5F5;font-size:11px}
.c-chain-item:last-child{border-bottom:none}
</style>
</head>
<body>

<div style="background:var(--navy);color:#fff;padding:14px 16px;text-align:center">
  <div style="font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;opacity:.7">From Decisions to Action</div>
  <div style="font-size:11px;opacity:.5;margin-top:2px">3 layout options — tap to compare</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('a')">A · Cards</div>
  <div class="tab" onclick="showTab('b')">B · Compact</div>
  <div class="tab" onclick="showTab('c')">C · Summary</div>
</div>

<!-- ═══ OPTION A: Card per district ═══ -->
<div class="view active" id="v-a">
  <div class="label">Each district is a card with a progress bar. Tap to see chains.</div>

  <div id="a-list"></div>
</div>

<!-- ═══ OPTION B: Compact list ═══ -->
<div class="view" id="v-b">
  <div class="label">Tight rows with inline bar + counts. Tap any row to expand.</div>

  <div id="b-list"></div>
</div>

<!-- ═══ OPTION C: Summary first ═══ -->
<div class="view" id="v-c">
  <div class="label">Big numbers up top, then district list underneath.</div>

  <div id="c-content"></div>
</div>

<script>
const data = [
  {prov:'KwaZulu-Natal',dist:'Pinetown',schools:4,chains:[
    {school:'School O, School H',dec:'Investigate SBA-exam gap',act:'SBA targets set with learners',status:'In Progress',date:'14 Feb 2026'},
    {school:'Pinetown Senior Primary',dec:'Arrange educator coaching or mentoring',act:'Educator coaching / mentoring',status:'In Progress',date:'13 Mar 2026'}
  ]},
  {prov:'National',dist:'All',schools:4,chains:[
    {school:'(4 schools)',dec:'Address curriculum pacing gaps',act:'Curriculum pacing support',status:'In Progress',date:'28 Jan 2026'}
  ]},
  {prov:'Gauteng',dist:'Ekurhuleni North',schools:58,chains:[
    {school:'58 schools',dec:'Schedule a data review meeting',act:'Data pack prepared for meeting',status:'In Progress',date:'03 Feb 2026'}
  ]},
  {prov:'North West',dist:'Rustenburg',schools:1,chains:[
    {school:'Boitekong Sec',dec:'Send in subject support',act:'Educator coaching / mentoring',status:'In Progress',date:'10 Feb 2026'}
  ]},
  {prov:'Limpopo',dist:'Vhembe West',schools:2,chains:[
    {school:'School K, School N',dec:'Adjust teaching strategy',act:'Educator coaching / mentoring',status:'In Progress',date:'10 Feb 2026'}
  ]},
  {prov:'Eastern Cape',dist:'Alfred Nzo East',schools:1,chains:[
    {school:'Ntsizwa SSS',dec:'Escalate to management',act:'Referral to SMT / DMT / PED',status:'Completed',date:'12 Feb 2026'}
  ]},
  {prov:'Gauteng',dist:'Ekurhuleni South',schools:68,chains:[
    {school:'68 schools',dec:'Set performance targets',act:'Term review meeting held',status:'In Progress',date:'20 Feb 2026'}
  ]},
  {prov:'Eastern Cape',dist:'Amathole West',schools:2,chains:[
    {school:'School I, School L',dec:'Escalate to management',act:'Accountability meeting with school',status:'Completed',date:'22 Feb 2026'}
  ]},
  {prov:'North West',dist:'Madibeng',schools:2,chains:[
    {school:'School X, School Y',dec:'Provide targeted support to identified learners',act:'Extra lessons / revision classes',status:'In Progress',date:'01 Mar 2026'}
  ]}
];

const expanded = {};

function totalP(){ return data.reduce((s,d)=>s+d.chains.filter(c=>c.status==='Planned').length,0); }
function totalIP(){ return data.reduce((s,d)=>s+d.chains.filter(c=>c.status==='In Progress').length,0); }
function totalC(){ return data.reduce((s,d)=>s+d.chains.filter(c=>c.status==='Completed').length,0); }
function totalChains(){ return data.reduce((s,d)=>s+d.chains.length,0); }
function maxChains(){ return Math.max(...data.map(d=>d.chains.length)); }

function badgeHTML(status){
  const cls = status==='Completed'?'c':status==='Planned'?'p':'ip';
  const icon = status==='Completed'?'✓':status==='Planned'?'○':'●';
  return '<span class="a-badge '+cls+'">'+icon+' '+status+'</span>';
}

function barSegs(p,ip,c,max){
  let html='';
  if(p) html+='<div class="a-bar-seg" style="width:'+Math.round((p/max)*100)+'%;background:var(--blue)"></div>';
  if(ip) html+='<div class="a-bar-seg" style="width:'+Math.round((ip/max)*100)+'%;background:var(--orange)"></div>';
  if(c) html+='<div class="a-bar-seg" style="width:'+Math.round((c/max)*100)+'%;background:var(--green)"></div>';
  return html;
}

function toggle(key){ expanded[key]=!expanded[key]; renderAll(); }

function showTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['a','b','c'][i]===id));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='v-'+id));
}

function chainDetailHTML(chains){
  return chains.map(c => 
    '<div class="a-chain">'+
      '<div class="a-chain-school">'+c.school+'</div>'+
      '<div class="a-chain-dec">Decided: '+c.dec+'</div>'+
      '<div class="a-chain-act">Action: '+c.act+'</div>'+
      '<div class="a-chain-foot">'+badgeHTML(c.status)+'<span class="a-date">'+c.date+'</span></div>'+
    '</div>'
  ).join('');
}

function renderAll(){
  const mx = maxChains();
  
  // ═══ OPTION A ═══
  let aHTML = '';
  data.forEach((d,i)=>{
    const key = 'a'+i;
    const isOpen = expanded[key];
    const p=d.chains.filter(c=>c.status==='Planned').length;
    const ip=d.chains.filter(c=>c.status==='In Progress').length;
    const c=d.chains.filter(c=>c.status==='Completed').length;
    
    aHTML += '<div class="a-card">';
    aHTML += '<div class="a-hdr" onclick="toggle(\''+key+'\')">';
    aHTML += '<div style="flex:1;min-width:0"><div class="a-prov">'+d.prov+'</div><div class="a-name">'+d.dist+'</div></div>';
    aHTML += '<div class="a-meta"><span class="a-schools">'+d.schools+' school'+(d.schools!==1?'s':'')+'</span><span class="a-chevron'+(isOpen?' open':'')+'">▶</span></div>';
    aHTML += '</div>';
    aHTML += '<div class="a-bar-wrap"><div class="a-bar">'+barSegs(p,ip,c,mx)+'</div></div>';
    aHTML += '<div class="a-legend">';
    if(ip) aHTML += '<span><span class="a-legend-dot" style="background:var(--orange)"></span><strong>'+ip+'</strong> In Progress</span>';
    if(c) aHTML += '<span><span class="a-legend-dot" style="background:var(--green)"></span><strong>'+c+'</strong> Done</span>';
    if(p) aHTML += '<span><span class="a-legend-dot" style="background:var(--blue)"></span><strong>'+p+'</strong> Planned</span>';
    aHTML += '</div>';
    if(isOpen) aHTML += '<div class="a-detail">'+chainDetailHTML(d.chains)+'</div>';
    aHTML += '</div>';
  });
  document.getElementById('a-list').innerHTML = aHTML;
  
  // ═══ OPTION B ═══
  let bHTML = '';
  data.forEach((d,i)=>{
    const key = 'b'+i;
    const isOpen = expanded[key];
    const p=d.chains.filter(c=>c.status==='Planned').length;
    const ip=d.chains.filter(c=>c.status==='In Progress').length;
    const cc=d.chains.filter(c=>c.status==='Completed').length;
    
    bHTML += '<div class="b-row" onclick="toggle(\''+key+'\')" style="'+(isOpen?'border-radius:8px 8px 0 0;border-bottom:none;':'')+'"><div class="b-entity"><div class="b-prov">'+d.prov+'</div><div class="b-name">'+d.dist+'</div></div><div class="b-right"><div class="b-bar">'+barSegs(p,ip,cc,mx).replace(/a-bar-seg/g,'b-bar-seg')+'</div><div class="b-counts">';
    if(ip) bHTML += '<span class="b-cnt ip"><span class="dot"></span>'+ip+' In Progress</span>';
    if(cc) bHTML += '<span class="b-cnt c"><span class="dot"></span>'+cc+' Done</span>';
    if(p) bHTML += '<span class="b-cnt pl"><span class="dot"></span>'+p+' Planned</span>';
    bHTML += '</div></div></div>';
    if(isOpen){
      bHTML += '<div class="b-detail">';
      d.chains.forEach(c=>{
        bHTML += '<div class="b-chain"><div style="font-weight:600;color:var(--grey-dk);font-size:10px;margin-bottom:3px">'+c.school+'</div><div style="color:var(--teal);font-weight:600">'+c.dec+'</div><div style="margin-top:2px">'+c.act+'</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px">'+badgeHTML(c.status)+'<span style="font-size:9px;color:var(--grey)">'+c.date+'</span></div></div>';
      });
      bHTML += '</div>';
    }
  });
  document.getElementById('b-list').innerHTML = bHTML;
  
  // ═══ OPTION C ═══
  const tp=totalP(), tip=totalIP(), tc=totalC(), tt=totalChains();
  let cHTML = '<div class="c-summary">';
  cHTML += '<div class="c-stats"><div class="c-stat"><div class="c-stat-num">'+tp+'</div><div class="c-stat-label">Planned</div></div><div class="c-stat highlight-ip"><div class="c-stat-num">'+tip+'</div><div class="c-stat-label">In Progress</div></div><div class="c-stat highlight-c"><div class="c-stat-num">'+tc+'</div><div class="c-stat-label">Done</div></div></div>';
  cHTML += '<div class="c-bar-full">'+barSegs(tp,tip,tc,tt).replace(/a-bar-seg/g,'c-bar-seg')+'</div>';
  cHTML += '</div>';
  
  cHTML += '<div class="c-districts">';
  data.forEach((d,i)=>{
    const key = 'c'+i;
    const isOpen = expanded[key];
    const p=d.chains.filter(c=>c.status==='Planned').length;
    const ip=d.chains.filter(c=>c.status==='In Progress').length;
    const cc=d.chains.filter(c=>c.status==='Completed').length;
    const total = d.chains.length;
    
    const statusText = [];
    if(ip) statusText.push(ip+' in progress');
    if(cc) statusText.push(cc+' done');
    if(p) statusText.push(p+' planned');
    
    cHTML += '<div class="c-dist" onclick="toggle(\''+key+'\')">';
    cHTML += '<div class="c-dist-info"><div class="c-dist-name">'+d.dist+'</div><div class="c-dist-sub">'+d.schools+' school'+(d.schools!==1?'s':'')+' · '+statusText.join(', ')+'</div></div>';
    cHTML += '<div class="c-dist-bar"><div class="c-dist-bar-inner">'+barSegs(p,ip,cc,mx).replace(/a-bar-seg/g,'c-dist-bar-seg')+'</div></div>';
    cHTML += '<span class="c-dist-chevron'+(isOpen?' open':'')+'">▶</span>';
    cHTML += '</div>';
    if(isOpen){
      cHTML += '<div class="c-detail">';
      d.chains.forEach(c=>{
        cHTML += '<div class="c-chain-item"><div style="font-weight:600;color:var(--grey-dk);font-size:10px;margin-bottom:3px">'+c.school+'</div><div style="color:var(--teal);font-weight:600">'+c.dec+'</div><div style="margin-top:2px">'+c.act+'</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px">'+badgeHTML(c.status)+'<span style="font-size:9px;color:var(--grey)">'+c.date+'</span></div></div>';
      });
      cHTML += '</div>';
    }
  });
  cHTML += '</div>';
  document.getElementById('c-content').innerHTML = cHTML;
}

renderAll();
</script>
</body>
</html>
